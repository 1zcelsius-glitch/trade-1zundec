<script>
const AK='trade_api_key';
const SHEET_ID='1IPBgWrrJRixIA5YYK7FutmDeKJxW4zXqTXyprc0TBBk';
const SCRIPT_KEY='trade_gas_url';

// Google Sheets sync
// ── ALERT MANAGEMENT ──
function saveAlerts(alerts){
  localStorage.setItem('ta_alerts',JSON.stringify(alerts));
  set({alerts});
}
// Price ladder: levels sorted like the chart axis, each with direction arrow + what-to-do hint
function ladderRows(a){
  const isS=a.direction==='SHORT';
  const rows=[
    {k:'SL',v:a.sl,c:'#f87171',bg:'#1c0a0a',arrow:isS?'▲':'▼',hint:isS?'above entry · exit if closes above':'below entry · exit if closes below'},
    {k:'🔔 ALERT',v:a.alertPrice,c:'#f97316',bg:'#1c0a00',arrow:isS?'▲':'▼',hint:isS?'price rises here → Recheck':'price falls here → Recheck'},
    {k:'🔔 ALT',v:a.alertPrice2,c:'#f97316',bg:'#1c0a00',arrow:isS?'▼':'▲',hint:'alt: if price skips pullback'},
    {k:'TP1 · 50%',v:a.tp1,c:'#4ade80',bg:'#052e16',arrow:isS?'▼':'▲',hint:'close 50% → SL to breakeven'},
    {k:'TP2 · 50%',v:a.tp2,c:'#4ade80',bg:'#052e16',arrow:isS?'▼':'▲',hint:'close the rest'}
  ].filter(r=>r.v&&!isNaN(parseFloat(r.v)));
  rows.sort((x,y)=>parseFloat(y.v)-parseFloat(x.v));
  return rows.map(r=>`<div style="display:flex;align-items:center;gap:7px;padding:7px 9px;background:${r.bg};border-radius:7px;margin-bottom:4px">
    <span style="color:${r.c};font-size:13px;font-weight:800;width:14px;text-align:center;flex-shrink:0">${r.arrow}</span>
    <span style="font-size:9px;color:${r.c};font-weight:700;width:62px;flex-shrink:0">${r.k}</span>
    <span style="font-size:14px;font-weight:800;color:#f1f5f9;flex:1">${r.v}</span>
    <span style="font-size:8px;color:#64748b;text-align:right;max-width:118px;line-height:1.3">${r.hint}</span>
  </div>`).join('');
}
// Workflow strip: where am I in the process (0 Analyse, 1 Alert, 2 Recheck, 3 Trade, 4 Journal)
function flowStrip(stage){
  const steps=[['📊','Analyse'],['🔔','Alert'],['🔄','Recheck'],['⚡','Trade'],['📝','Journal']];
  return `<div style="display:flex;gap:3px;margin-bottom:10px">`+steps.map((s,i)=>`<div style="flex:1;text-align:center;padding:4px 2px;border-radius:6px;background:${i===stage?'#0f2417':'#080c18'};border:1px solid ${i===stage?'#22c55e':'#1e293b'};${i<stage?'opacity:.55':''}"><div style="font-size:10px">${i<stage?'✓':s[0]}</div><div style="font-size:7px;color:${i===stage?'#4ade80':'#475569'};font-weight:700">${s[1]}</div></div>`).join('')+`</div>`;
}

function addAlert(alert){
  const a={
    id:Date.now(),
    pair:alert.pair||AP2()||'',
    market:alert.market||S.market,
    direction:alert.direction||'SHORT',
    alertPrice:alert.alertPrice||'',
    condition:alert.condition||'Price reaches level',
    entryTF:alert.entryTF||'1H',
    htfTF:alert.htfTF||'4H',
    sl:alert.sl||'',
    tp1:alert.tp1||'',
    tp2:alert.tp2||'',
    rr:alert.rr||'',
    originalAnalysisId:alert.originalAnalysisId||null,
    originalAnalysisSummary:alert.originalAnalysisSummary||'',
    status:'ACTIVE',// ACTIVE | TRIGGERED | CANCELLED | ENTERED | MISSED
    createdAt:new Date().toLocaleString(),
    triggeredAt:null,
    recheckResult:null,
    tradeResult:null,
    notes:alert.notes||'',
  };
  const newAlerts=[a,...S.alerts];
  saveAlerts(newAlerts);
  // Sync to Google Sheets
  if(localStorage.getItem(SCRIPT_KEY)){
    gasPost({action:'addAlert',alert:a}).catch(()=>{});
  }
  return a;
}

const EXPIRE_P=`You are a precise alert-expiry verification analyst. The trader set a price alert for a planned trade that NEVER fired — price may have moved away instead. Your ONLY job: verify from the uploaded chart(s) whether this alert is now EXPIRED.

EXPIRY CONDITION (the only test): price has moved AWAY from the alert level AND a confirmed AMF has printed in the OPPOSITE direction to the planned trade, on the entry TF (check the 4H too if provided). A confirmed AMF = candle bodies closing beyond prior bodies in that opposite direction — close-based, wicks don't count.
Strong supporting evidence: the alternate/opposite-scenario alert level (if stated in context) was broken with a body close.

OUTPUT FORMAT (strict, short):
VERDICT: EXPIRED CONFIRMED ✅  or  STILL VALID — KEEP ALERT ⏳
EVIDENCE: 2-4 lines max — what price did relative to the alert level, the opposite-direction AMF status (confirmed/not), volume note if visible.
WHAT PRICE DID INSTEAD: one line for the journal — where it went and how far.
WOULD THE PLANNED TRADE HAVE WON OR LOST? One honest line: if the trade had somehow filled at the planned entry, does the visible chart suggest it would have hit TP1 or SL first? If unknowable, say so.
If STILL VALID: one line on why the setup remains live (price could still return; no opposite AMF confirmed).
No trade advice. No new setups. Verification only.`;

function triggerAlert(id){
  const alerts=S.alerts.map(a=>a.id===id?{...a,status:'TRIGGERED',triggeredAt:new Date().toLocaleString()}:a);
  saveAlerts(alerts);
  // Open recheck for this alert
  const alert=alerts.find(a=>a.id===id);
  set({screen:'recheck',recheckAlert:alert,recheckResult:null,images:{W1:null,M15:null,H1:null,H4:null,D1:null},notes:'Price hit my alert. Checking entry confirmation.'});
  // Sync status
  if(localStorage.getItem(SCRIPT_KEY)){
    gasPost({action:'updateAlert',id,status:'TRIGGERED',triggeredAt:new Date().toLocaleString()}).catch(()=>{});
  }
}

function updateAlertStatus(id,status,extra={}){
  const alerts=S.alerts.map(a=>a.id===id?{...a,status,...extra}:a);
  saveAlerts(alerts);
  if(localStorage.getItem(SCRIPT_KEY)){
    gasPost({action:'updateAlert',id,status,...extra}).catch(()=>{});
  }
}

function cancelAlert(id){
  updateAlertStatus(id,'CANCELLED');
}

// Expiry flow: verify with a fresh chart (like Recheck) that price moved away with opposite AMF
function expireAlert(id){
  const alert=S.alerts.find(a=>a.id===id);
  set({screen:'recheck',recheckMode:'expire',recheckAlert:alert,recheckResult:null,images:{W1:null,M15:null,H1:null,H4:null,D1:null},notes:'Price never reached my alert at '+(alert?.alertPrice||'?')+'. Checking if the setup has expired.'});
}

function logExpiredToJournal(id){
  const a=S.alerts.find(x=>x.id===id);if(!a)return;
  updateAlertStatus(id,'EXPIRED',{recheckDecision:'EXPIRED',recheckAt:new Date().toLocaleString()});
  const verdict=(S.recheckResult||'').slice(0,400);
  set({screen:'journal',showAdd:true,recheckMode:null,nt:{...emptyTrade(),
    pair:a.pair||'',market:a.market||S.market,direction:a.direction||'SHORT',grade:a.grade||'B',
    result:'EXPIRED',entry:a.alertPrice||'',sl:a.sl||'',tp:a.tp1||'',
    trendAlign:'WITH',
    analysisSnapshot:verdict,
    notes:'EXPIRED SETUP — price never reached the alert. Plan was: entry '+(a.alertPrice||'?')+' / SL '+(a.sl||'?')+' / TP1 '+(a.tp1||'?')+' / TP2 '+(a.tp2||'?')+'. What price did instead + would it have won or lost: '}});
}

// ── AUTO-JOURNAL: one-tap trade logging with everything computed from the alert ──
function computedRR(entry,sl,exit){
  const e=parseFloat(entry),s=parseFloat(sl),x=parseFloat(exit);
  if([e,s,x].some(isNaN)||e===s)return'';
  const rr=Math.abs(x-e)/Math.abs(e-s);
  return rr.toFixed(2)+':1';
}
async function autoJournal(a,result,exitLabel,exitPrice){
  const t={...emptyTrade(),id:Date.now(),
    pair:a.pair||'',market:a.market||S.market,direction:a.direction||'SHORT',grade:a.grade||'B',
    result,entry:a.alertPrice||'',sl:a.sl||'',tp:exitPrice||'',
    rrActual:(result==='WIN')?computedRR(a.alertPrice,a.sl,exitPrice):(result==='LOSS'?'-1:1':(result==='BE'?'0:1':'')),
    analysisSnapshot:(a.originalAnalysisSummary||a.notes||'').slice(0,300),
    notes:'AUTO-LOGGED · '+exitLabel+' · plan: entry '+(a.alertPrice||'?')+' / SL '+(a.sl||'?')+' / TP1 '+(a.tp1||'?')+(a.tp2?' / TP2 '+a.tp2:''),
    deviation:''};
  const j={...S.journal,trades:[t,...S.journal.trades]};
  saveJ(j);
  if(S.gasUrl){syncToSheet(t).catch(()=>{});}
  return t;
}
// Close an OPEN trade (an ENTERED alert) with one tap
async function closeTrade(id,kind){
  const a=S.alerts.find(x=>x.id===id);if(!a)return;
  const map={
    TP1:{result:'WIN',label:'Hit TP1 '+(a.tp1||''),price:a.tp1},
    TP2:{result:'WIN',label:'Hit TP2 '+(a.tp2||''),price:a.tp2},
    BE:{result:'BE',label:'Closed at breakeven '+(a.alertPrice||''),price:a.alertPrice},
    SL:{result:'LOSS',label:'Hit SL '+(a.sl||''),price:a.sl}
  }[kind];
  if(!map)return;
  await autoJournal(a,map.result,map.label,map.price);
  updateAlertStatus(id,'CLOSED',{closedAt:new Date().toLocaleString(),recheckDecision:'CLOSED · '+kind});
  set({screen:'journal'});
}

// ── RE-CHECK ENTRY ──
const RECHECK_P=`You are a precise trade entry confirmation analyst. The trader already completed a full 5-TF analysis. The alert price has been hit. Your ONLY job is to confirm or reject the entry on the ENTRY TIMEFRAME.

YOU ALREADY KNOW (from original analysis context below):
→ The neckline level and type
→ The HTF AMF direction (4H + 1D already confirmed)
→ The planned entry zone, SL, TP1, TP2
→ The swing break pattern to watch

YOUR ONLY CHECK NOW:
Rule 3 — Has the break candle on the ENTRY TF (stated in context) closed STRONGLY?
→ SHORT: break candle body closes near its LOW, below previous body, above avg volume
→ LONG: break candle body closes near its HIGH, above previous body, above avg volume

Also check:
→ PAIR MATCH (checked FIRST, before anything else): Does the uploaded chart's pair match the alert's pair? If it does NOT match: the verdict is capped at WAIT automatically, the FIRST line of your output must be "🔴 PAIR MISMATCH — chart shows [X], alert is for [Y]. Upload the correct chart." and you must NOT print ANY levels, entries, SLs or TPs — no analysis of the wrong chart, full stop.
→ LOCATION-FIRST: Is current price AT a mapped HTF neckline/Fib confluence? If price is between mapped levels, output SKIP — "fails Location-First Rule: no tradeable signal exists away from a mapped level."
→ Did the pullback reach the Fib level? (stated in context)
→ 50% REVERSAL TRIGGER check (this IS the confirmation — objective, close-based): after a consolidation/inside-bar cluster AT the level, has a candle CLOSED (a) beyond the 0.5 midpoint of the consolidation range in the trade's direction AND (b) beyond 50% of the previous candle's range? Wick-only = NO. If both closes confirmed → confirmation printed; also check volume vs MA50 (trigger on dead volume = wait one more candle). If the trigger has NOT printed → answer is WAIT/SKIP, never "probably fine."
→ Is the 15M/1H AMF confirming? (entry TF only — HTF already confirmed)
→ Any fake move on entry TF that invalidates?
→ RE-ENTRY GUARD: If context or chart shows the trader was just stopped out on this same pair/direction (SL level visibly swept), output SKIP unless a FRESH 3/3 swing break has fully formed after the stop-out. Market orders are banned on re-entries. Say "RE-ENTRY AFTER STOP-OUT" explicitly in the decision line.
→ CIRCUIT BREAKER: If context indicates 2+ losing closes across any pairs in the last 24h, output WAIT regardless of setup quality — no entries until the next daily close. State "🔴 CIRCUIT BREAKER ACTIVE" in the decision line.

BE FAST AND DECISIVE. One chart is enough. The trader needs a clear answer in seconds.

FORMAT:
⚡ RECHECK — [PAIR] [DIRECTION]
Original plan: [neckline | entry zone | SL | TP1 | TP2]
Entry TF checked: [which TF from context]
Current price vs entry zone: [at zone / above / below]

RULE 3 CHECK — Break candle on [entry TF]:
Candle body: closes strongly [yes✅/no❌/not yet⏳]
Volume: above avg✅ / below avg❌
Pullback to Fib: reached✅ / not yet⏳ / overshot❌
Entry TF AMF: confirms direction✅ / contradicts❌ / unclear⏳
Fake move on entry TF: none✅ / possible⚠️

🎯 DECISION: ENTER NOW✅ / WAIT⏳ / SKIP❌

[ENTER NOW — the ONLY verdict where order instructions are allowed]: Place LIMIT at [entry zone] | SL [exact] | TP1 [exact] 50% close | TP2 [exact] 50% hold | RR [X:1]

[WAIT — CRITICAL OUTPUT RULES, human-factors safety]:
1. List the unmet conditions FIRST, numbered, each starting with what must happen (e.g. "1. A 15M candle must CLOSE above 0.1835 with volume ≥ MA50").
2. THEN, if showing the planned levels at all, they go under this exact header and nothing else:
"🔒 PENDING TRIGGER — this order does NOT exist yet. Placing this limit now = entering AGAINST this recheck."
3. NEVER write the words "place LIMIT", "place order" or any imperative order instruction in a WAIT output — levels are reference only, verbs are forbidden.
4. The LAST line of every WAIT output must be exactly this, filled in:
"👉 Action right now: set alert at [level], close the app. Nothing else."

[SKIP]: What specifically invalidated — e.g. "4H bullish AMF contradicts — do not enter". No levels printed. Last line: "👉 Action right now: nothing. Close the app."
⚠️Not financial advice.`;


async function runRecheck(){
  const up=Object.entries(S.images).filter(([,v])=>v);
  if(!up.length){set({error:'Upload your entry TF chart ('+( S.recheckAlert?.entryTF||'1H')+') to recheck.'});return;}
  set({recheckLoading:true,error:null,recheckResult:null});
  try{
    const imgs=up.map(([,d])=>i2b(d));
    const alert=S.recheckAlert;

    // Build rich context from original analysis + alert data
    const context=alert?`
═══════════════════════════════════
ORIGINAL ANALYSIS CONTEXT (already confirmed — do not redo)
═══════════════════════════════════
Pair: ${alert.pair} | Market: ${alert.market||'crypto'}
Direction: ${alert.direction} | Trend type: WITH TREND (use rules accordingly)
Entry TF: ${alert.entryTF} ← THIS IS THE ONLY TF TO CHECK NOW
HTF confirmation already done: ${alert.htfTF} AMF confirmed ✅

NECKLINE + LEVELS FROM ORIGINAL ANALYSIS:
Alert/Entry zone: ${alert.alertPrice}
SL: ${alert.sl} (above/below ${alert.entryTF} swing HH/LL + 25 pips) — invalidation is CLOSE-based: wick touch = warning only, candle close beyond = exit
TP1 (50% close): ${alert.tp1} ← first ENTRY-TF S/R (Geometry Gate: must be ≥1:1)
TP2 (50% hold): ${alert.tp2} ← ACTION-TF neckline (4H for 15M entry / 1D for 1H entry)
Move SL to breakeven after TP1 hits.
R:R: ${alert.rr||'check analysis'}

ORIGINAL PLAN SUMMARY:
${alert.originalAnalysisSummary||'See charts'}

WHAT TO CHECK NOW:
Chart uploaded: ${up.map(([tf])=>tf).join(', ')}
Check ONLY: Has Rule 3 (strong candle close on ${alert.entryTF}) formed?
Has pullback reached entry zone ${alert.alertPrice}?
Any fake move or AMF contradiction on ${alert.entryTF}?
DO NOT re-analyse HTF — it is already confirmed above.
═══════════════════════════════════
`:`Charts uploaded: ${up.map(([tf])=>tf).join(', ')}
No original analysis linked — check entry TF only for swing break + candle confirmation.`;

    const isExpire=S.recheckMode==='expire';
    const expireCtx=isExpire&&alert?`\nEXPIRY CHECK for this alert:\nPair: ${alert.pair} | Planned direction: ${alert.direction} | Alert/entry level: ${alert.alertPrice}${alert.alertPrice2?` | Alternate/opposite-scenario level: ${alert.alertPrice2}`:''}\nPlanned SL: ${alert.sl} | TP1: ${alert.tp1} | TP2: ${alert.tp2} | Entry TF: ${alert.entryTF}\nQuestion: has price moved away from ${alert.alertPrice} with a confirmed OPPOSITE-direction AMF (opposite to ${alert.direction})?`:'';
    const d=await api({model:'claude-sonnet-4-6',max_tokens:1500,system:isExpire?EXPIRE_P:RECHECK_P,
      messages:[{role:'user',content:[...imgs,{type:'text',text:dateContext()+'\n'+(isExpire?expireCtx+'\n':'')+context}]}]});
    const result=d.content?.map(b=>b.text||'').join('\n')||'No response.';

    // Save recheck result to alert
    if(alert){
      const decision=result.includes('ENTER NOW')?'ENTERED':result.includes('SKIP')?'SKIPPED':'WAIT';
      const alerts=S.alerts.map(a=>a.id===alert.id?{...a,recheckResult:result,recheckDecision:decision,recheckAt:new Date().toLocaleString()}:a);
      saveAlerts(alerts);
      if(localStorage.getItem(SCRIPT_KEY)){
        gasPost({action:'updateAlert',id:alert.id,recheckResult:result.slice(0,500),recheckDecision:decision,recheckAt:new Date().toLocaleString()}).catch(()=>{});
      }
      const recheckEntry={
        id:Date.now(),
        date:new Date().toLocaleString(),
        pair:alert.pair,
        market:alert.market||S.market,
        notes:`RECHECK: ${alert.direction} at ${alert.alertPrice}. Decision: ${decision}`,
        analysis:result,
        rfStatus:'CLEAR',
        newsSentiment:'neutral',
        type:'recheck',
        alertId:alert.id,
      };
      const newHistory=[recheckEntry,...S.history].slice(0,50);
      localStorage.setItem('ah',JSON.stringify(newHistory));
      set({recheckResult:result,recheckLoading:false,history:newHistory,recheckAlert:{...alert,recheckResult:result,recheckDecision:decision}});
    } else {
      set({recheckResult:result,recheckLoading:false});
    }
  }catch(e){

function addAlertFromAnalysis(){
  const d=extractAnalysisData(S.analysis||'');
  const histEntry=S.history[0];
  // Normalize markdown bold and tildes so **1,680** and ~1,680 match; strip commas from captures
  const analysis=(S.analysis||'').replace(/\*\*/g,'').replace(/\*/g,'').replace(/~(?=\s*[0-9$])/g,'');
  const NUM='([0-9][0-9,]*\\.?[0-9]*)';
  const dc=v=>v?v.replace(/,/g,''):v;

  // Extract entry TF from analysis
  const entryTFMatch=analysis.match(/Entry TF[:\s]+([0-9]+[MHmh]+)/i);
  const entryTF=entryTFMatch?.[1]?.toUpperCase()||'1H';
  const htfTF=entryTF==='15M'?'4H':entryTF==='1H'?'1D':'4H';

  // Extract alert levels
  const alert1=dc(analysis.match(new RegExp('Alert\\s*1[:\\s]+\\$?'+NUM,'i'))?.[1]);
  const alert2=dc(analysis.match(new RegExp('Alert\\s*2[:\\s]+\\$?'+NUM,'i'))?.[1]);
  const entryZone=dc(analysis.match(new RegExp('Entry zone[^0-9$]{0,20}\\$?'+NUM,'i'))?.[1]);
  const alertPrice=alert1||entryZone||d.entry||'';
  const alertPrice2=alert2||'';

  // Extract Fib levels for context
  const fib618=dc(analysis.match(new RegExp('0\\.618\\s*=\\s*\\$?'+NUM,'i'))?.[1]);
  const fib705=dc(analysis.match(new RegExp('0\\.705\\s*=\\s*\\$?'+NUM,'i'))?.[1]);
  const fib730=dc(analysis.match(new RegExp('0\\.730\\s*=\\s*\\$?'+NUM,'i'))?.[1]);
  const fibNote=fib618?`Fib 0.618=${fib618} | 0.705=${fib705||'?'} | 0.730=${fib730||'?'}`:'' ;

  // Build rich summary for recheck context
  const summary=`${d.oneLine||''}\n${fibNote}\nEntry TF: ${entryTF} | HTF: ${htfTF}`;

  set({
    screen:'alerts',
    showAddAlert:true,
    showAlertConfirm:true,
    newAlert:{
      pair:AP2()||S.pair||'',
      market:S.market,
      direction:(d.direction==='LONG'||d.direction==='SHORT')?d.direction:'SHORT',
      alertPrice:alertPrice,
      alertPrice2:alertPrice2,
      grade:(d.grade==='A+'||d.grade==='B'||d.grade==='C')?d.grade:'B',
      sl:d.sl||'',
      tp1:d.tp1||'',
      tp2:d.tp2||'',
      rr:d.rr||'',
      entryTF:entryTF,
      htfTF:htfTF,
      originalAnalysisId:histEntry?.id||null,
      originalAnalysisSummary:summary.slice(0,500),
      notes:d.oneLine||'',
    }
  });
}

// Cross-device alert sync (two-way): pull alerts from the Sheet, merge by id,
// then PUSH any local alerts the Sheet doesn't have yet (so pre-connection alerts propagate).
async function pullAlerts(silent){
  if(!localStorage.getItem(SCRIPT_KEY))return false;
  if(!silent)set({syncStatus:'⏳ Syncing alerts…'});
  const d=await gasGet('getAlerts');
  if(!d||!Array.isArray(d.alerts)){if(!silent)set({syncStatus:'⚠️ Alert sync failed — check Apps Script has getAlerts'});return false;}
  const remoteIds=new Set(d.alerts.filter(r=>r&&r.id!==''&&r.id!==null&&r.id!==undefined).map(r=>String(r.id)));
  const map={};
  (S.alerts||[]).forEach(a=>{map[String(a.id)]=a;});
  d.alerts.forEach(r=>{
    if(!r||r.id===''||r.id===null||r.id===undefined)return;
    const k=String(r.id);
    const clean={};Object.keys(r).forEach(f=>{if(r[f]!==''&&r[f]!==null&&r[f]!==undefined)clean[f]=r[f];});
    clean.id=Number(r.id)||r.id;
    map[k]={...(map[k]||{}),...clean};
  });
  const merged=Object.values(map).sort((x,y)=>(Number(y.id)||0)-(Number(x.id)||0));
  saveAlerts(merged);
  // Push up local alerts missing from the Sheet
  const toPush=merged.filter(a=>!remoteIds.has(String(a.id)));
  let pushed=0;
  for(const a of toPush){ const ok=await gasPost({action:'addAlert',alert:a}); if(ok)pushed++; }
  if(!silent)set({syncStatus:'✅ Alerts synced ('+merged.length+(pushed?' · uploaded '+pushed+' to Sheet':'')+')'});
  return true;
}

async function api(body){
  const k=S.apiKey;
  if(!k){set({showApiSetup:true});throw new Error('No API key');}
  if(location.protocol==='file:') throw new Error('FILE_PROTOCOL');
  const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':k,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify(body)});
  if(!r.ok){const e=await r.json();throw new Error(e.error?.message||'API error '+r.status);}
  return r.json();
}

async function fetchNews(p){
  try{const d=await api({model:'claude-sonnet-4-6',max_tokens:1000,tools:[{type:'web_search_20250305',name:'web_search'}],messages:[{role:'user',content:`Search latest 48h news for ${p} ${m().label} market. Return ONLY raw JSON: {"coin_news":[{"title":"...","impact":"bullish/bearish/neutral","summary":"..."}],"macro_news":[{"title":"...","impact":"bullish/bearish/neutral","summary":"..."}],"overall_news_sentiment":"bullish/bearish/neutral","sentiment_reason":"..."}`}]});
  const t=d.content?.map(b=>b.text||'').join('\n')||'{}';return JSON.parse(t.replace(/```json|```/g,'').trim());}catch{return null;}
}

async function fetchRF(p){
  try{const d=await api({model:'claude-sonnet-4-6',max_tokens:1000,tools:[{type:'web_search_20250305',name:'web_search'}],messages:[{role:'user',content:`Scan red flag news for ${p||'market'} (${m().label}). ${RF_P[S.market]} Return ONLY raw JSON: {"overall_status":"RED|ORANGE|YELLOW|CLEAR","flags":[{"severity":"RED|ORANGE|YELLOW","category":"...","title":"...","detail":"...","action":"..."}],"upcoming_events":[{"event":"...","timing":"...","impact":"HIGH|MEDIUM|LOW","note":"..."}],"trading_recommendation":"...","clear_to_trade":true}`}]});
  const t=d.content?.map(b=>b.text||'').join('\n')||'{}';const m2=t.replace(/```json|```/g,'').trim().match(/\{[\s\S]*\}/);return m2?JSON.parse(m2[0]):null;}catch{return null;}
}

async function runAnalysis(){
  const up=Object.entries(S.images).filter(([,v])=>v);
  if(!up.length){set({error:'Upload at least one chart.'});return;}
  set({loading:true,error:null,analysis:null,entry:null,cont:null,news:null,rf:null,rfDis:false});
  try{
    set({step:'🛡️ Scanning red flags...'});let rf=null;try{rf=await fetchRF(AP2());set({rf});}catch{}
    set({step:'📰 Fetching news...'});let news=null;try{news=await fetchNews(AP2());set({news});}catch{}
    set({step:'📊 Analysing charts...'});
    const imgs=up.map(([,d])=>i2b(d));
    const rfCtx=rf?`\nRED FLAG: ${rf.overall_status}. ${rf.trading_recommendation}`:'';
    const newsCtx=news?`\nNEWS: ${JSON.stringify(news)}`:'';
    const d=await api({model:'claude-sonnet-4-6',max_tokens:16000,system:AP[S.market],messages:[{role:'user',content:[...imgs,{type:'text',text:`Pair: ${AP2()||'identify'}\nMarket: ${m().label}\nTFs: ${up.map(([tf])=>tf).join(', ')}${dateContext()}${S.notes?`\nMY BIAS & THOUGHTS: ${S.notes}`:''}${newsCtx}${rfCtx}`}]}]});
    const analysisText=d.content?.map(b=>b.text||'').join('\n')||'No response.';
    // Detect if response was cut off
    const stopReason=d.stop_reason||'';
    const wasCutOff=stopReason==='max_tokens';
    const finalText=wasCutOff?analysisText+'\n\n⚠️ [Analysis was cut off before completing — this usually happens on dual-direction (long+short) reports for volatile/complex pairs. The sections already shown above are complete and usable, but sections after the cutoff point are missing. If a critical section (Trade Decision, RR Calculation, or Invalidation) is missing, re-run the analysis — it may complete this time, or try uploading fewer timeframes to shorten the required output.]':analysisText;

    // Save to local history
    const histEntry={
      id:Date.now(),
      date:new Date().toLocaleString(),
      pair:AP2()||'Unknown',
      market:S.market,
      notes:S.notes,
      analysis:finalText,
      rfStatus:rf?.overall_status||'CLEAR',
      newsSentiment:news?.overall_news_sentiment||'neutral',
    };
    const newHistory=[histEntry,...S.history].slice(0,50);
    localStorage.setItem('ah',JSON.stringify(newHistory));
    set({analysis:finalText,history:newHistory,tab:'full',loading:false,step:''});

    // Sync to Google Sheets in background (non-blocking)
    if(localStorage.getItem(SCRIPT_KEY)){
      syncHistoryEntry(histEntry).catch(()=>{});
    }
  }catch(e){set({error:e.message||'Failed.',loading:false,step:''});}
}

function calcStats(){
  const all=S.journal.trades;if(!all.length)return null;
  const expired=all.filter(x=>x.result==='EXPIRED').length;
  const skipped=all.filter(x=>x.result==='SKIPPED').length;
  const missed=all.filter(x=>x.result==='MISSED').length;
  const t=all.filter(x=>!['EXPIRED','SKIPPED','MISSED'].includes(x.result));
  if(!t.length)return{total:0,wins:0,losses:0,be:0,wr:'0.0',expired,skipped,missed,byM:{},byP:{},byS:{},byTrap:{},byTrend:{}};
  const wins=t.filter(x=>x.result==='WIN').length,losses=t.filter(x=>x.result==='LOSS').length,be=t.filter(x=>x.result==='BE').length;
  const aP=t.filter(x=>x.grade==='A+'),bP=t.filter(x=>x.grade==='B');
  const byM={},byP={},byS={},byTrap={},byTrend={};
  t.forEach(x=>{
    const mk=x.market||'crypto';if(!byM[mk])byM[mk]={wins:0,total:0};byM[mk].total++;if(x.result==='WIN')byM[mk].wins++;
    if(!byP[x.pair])byP[x.pair]={wins:0,total:0,market:mk};byP[x.pair].total++;if(x.result==='WIN')byP[x.pair].wins++;
    const ss=x.session||'?';if(!byS[ss])byS[ss]={wins:0,total:0};byS[ss].total++;if(x.result==='WIN')byS[ss].wins++;
    const tr=x.trapScore||'?';if(!byTrap[tr])byTrap[tr]={wins:0,total:0};byTrap[tr].total++;if(x.result==='WIN')byTrap[tr].wins++;
    const td=x.trendAlign||'?';if(!byTrend[td])byTrend[td]={wins:0,total:0};byTrend[td].total++;if(x.result==='WIN')byTrend[td].wins++;
  });
  const rrVals=t.filter(x=>x.rrActual&&!isNaN(parseFloat(x.rrActual))).map(x=>parseFloat(x.rrActual));
  return{total:t.length,wins,losses,be,expired,skipped,missed,wr:((wins/t.length)*100).toFixed(1),
    pnl:t.reduce((s,x)=>s+(parseFloat(x.pnl)||0),0).toFixed(2),
    aPWR:aP.length?((aP.filter(x=>x.result==='WIN').length/aP.length)*100).toFixed(1):'N/A',
    bWR:bP.length?((bP.filter(x=>x.result==='WIN').length/bP.length)*100).toFixed(1):'N/A',
    avgRR:rrVals.length?(rrVals.reduce((a,b)=>a+b,0)/rrVals.length).toFixed(2):null,
    byM,byP,byS,byTrap,byTrend};
}

.impact==='MEDIUM'?'#1c1200':'#080c18'};border:1px solid ${e.impact==='HIGH'?'#7f1d1d':e.impact==='MEDIUM'?'#78350f':'#1e293b'}">${e.impact}</div></div>`).join('')}</div>`:''}

function wrRow(label,d,sub){
  if(!d||!d.total)return'';
  const wr=((d.wins/d.total)*100).toFixed(0);
  const c=parseInt(wr)>=70?'#4ade80':parseInt(wr)>=50?'#fbbf24':'#f87171';
  return`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><div><div style="font-size:11px;font-weight:700;color:#e2e8f0">${label}</div><div style="font-size:9px;color:#475569">${d.wins}W/${d.total-d.wins}L${sub?' · '+sub:''}</div></div><div style="text-align:right"><div style="font-size:14px;font-weight:800;color:${c}">${wr}%</div><div class="sbar-bg" style="width:68px"><div class="sbar" style="width:${wr}%;background:${c}"></div></div></div></div>`;
}

function extractAnalysisData(text){
  if(!text||typeof text!=='string') return{bias:'N/A',conviction:'N/A',direction:'N/A',trendAlign:'N/A',trapScore:'N/A',setupScore:'N/A',entry:'N/A',sl:'N/A',tp1:'N/A',tp2:'N/A',rr:'N/A',srWarning:'N/A',candleSignal:'N/A',weekendRisk:'N/A',session:'N/A',rfStatus:'N/A',oneLine:'N/A'};
  // Normalize: strip markdown bold/italics and tildes before numbers, so **1,628** and ~1,680 match
  const t=text.replace(/\*\*/g,'').replace(/\*/g,'').replace(/~(?=\s*[0-9$])/g,'');
  const NUM='([0-9][0-9,]*\\.?[0-9]*)';
  const deComma=v=>(v&&v!=='N/A')?v.replace(/,/g,''):v;
  const get=(patterns)=>{for(const p of patterns){try{const m=t.match(p);if(m&&m[1])return m[1].trim();}catch{}}return'N/A';};
  return{
    bias:get([/Weekly bias:\s*(BULL|BEAR|NEUTRAL)/,/Direction:\s*(BULLISH|BEARISH|NEUTRAL)/,/Direction:\s*(BULL|BEAR|NEUTRAL)/]),
    conviction:get([/Conviction:\s*([A-Za-z-]+)/]),
    direction:get([/Higher Probability(?:\s+Direction)?[:\s]+\s*(LONG|SHORT)/i,/PRIMARY DIRECTION[:\s]+\s*(LONG|SHORT)/i,/PRIORITY DIRECTION[:\s]+\s*(LONG|SHORT)/i,/###\s*(SHORT|LONG)\s*\(Primary/i,/TRADE DECISION\s*[—-]\s*(LONG|SHORT)/i,/Direction:\s*(SHORT|LONG|WAIT)/,/Decision:\s*(SHORT|LONG|WAIT)/]),
    trendAlign:get([/Trend(?:\s*alignment)?:\s*(WITH TREND|AGAINST TREND|COUNTER TREND)/,/Trend:\s*(WITH|AGAINST|COUNTER)/])||'N/A',
    grade:get([/Grade:\s*(A\+|B|C|SKIP)/]),
    trapScore:get([/[Tt]rap.*?(\d\/3)/,/trap score.*?(\d\/3)/i]),
    setupScore:get([/Score:\s*(\d+)\/10/,/(\d+)\/10\s*\|?\s*Grade/,/\|\s*(\d+)\/10/]),
    entry:deComma(get([new RegExp('Entry:\\s*(?:LIMIT at\\s*)?\\$?'+NUM),new RegExp('Entry zone[^0-9$]{0,20}\\$?'+NUM)])),
    sl:deComma(get([new RegExp('SL:\\s*\\$?'+NUM+'(?!\\s*[A-Za-z])'),new RegExp('SL:\\s*\\$?'+NUM)])),
    tp1:deComma(get([new RegExp('TP1(?:\\s*\\(50%[^)]*\\))?:\\s*\\$?'+NUM),new RegExp('TP1[:\\s=]+\\$?'+NUM)])),
    tp2:deComma(get([new RegExp('TP2(?:\\s*\\(50%[^)]*\\))?(?:\\s*\\(system exit\\))?:\\s*\\$?'+NUM),new RegExp('TP2[:\\s=]+\\$?'+NUM)])),
    rr:get([/RR to TP1:\s*([0-9.]+:[0-9.]+)/i,/R:R:\s*([0-9.]+:[0-9.]+|[0-9.]+x?)/,/R:R[:\s]+([0-9.]+:[0-9.]+)/]),
    srWarning:t.includes('S/R WARNING')||t.includes('SHORT WARNING')||t.includes('LONG WARNING')?'⚠️ Yes':'✅ Clear',
    candleSignal:get([/Overall(?:\s+candle)?(?:\s+signal)?:\s*(CONFIRMS[^\n|]{0,50}|WARNS[^\n|]{0,50}|WAIT[^\n|]{0,50}|NO VALID[^\n|]{0,50})/]),
    weekendRisk:get([/(?:Weekend\s+)?[Rr]isk:\s*(HIGH|MEDIUM|LOW)/]),
    session:get([/Session[:\s]+([A-Za-z\s\/]+)\|/])||'N/A',
    rfStatus:get([/RF:\s*(CLEAR|RED|ORANGE|YELLOW)/])||'CLEAR',
    oneLine:get([/One-line(?:\s+decision)?:\s*\[?([^\n\]]+)/]),
  };
}

function copyAnalysisReport(h){
  const mc=MARKETS[h.market]||MARKETS.crypto;
  const d=extractAnalysisData(h.analysis||'');
  const report=`========================================
ANALYSIS REPORT — ${h.pair} (${mc.label.toUpperCase()})
Date: ${h.date}
========================================

MY BIAS: ${h.notes||'Not stated'}

STRUCTURED DATA:
DECISION: ${d.oneLine||'See full analysis'}
Direction: ${d.direction} | Trend: ${d.trendAlign}
Bias: ${d.bias} | Conviction: ${d.conviction}
Setup Score: ${d.setupScore}/10 | Trap: ${d.trapScore}
RF: ${h.rfStatus||'?'} | S/R Warning: ${d.srWarning}
Candle Signal: ${d.candleSignal}
Weekend Risk: ${d.weekendRisk}

LEVELS:
Entry: ${d.entry} | SL: ${d.sl} | TP1: ${d.tp1} | TP2: ${d.tp2} | R:R: ${d.rr}

Set price alert at Entry: ${d.entry}

Set price alert at TP1: ${d.tp1}
Set price alert at TP2: ${d.tp2}

FULL ANALYSIS:
${h.analysis||'No analysis saved'}
========================================`;

  // Try clipboard API first, then fallback for mobile
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(report)
      .then(()=>showCopySuccess(h.id))
      .catch(()=>mobileCopyFallback(report,h.id));
  } else {
    mobileCopyFallback(report,h.id);
  }
}

function mobileCopyFallback(text,id){
  // Create textarea, select all, copy — works on all mobile browsers
  const ta=document.createElement('textarea');
  ta.value=text;
  ta.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;opacity:0.01;z-index:9999;font-size:16px';
  document.body.appendChild(ta);
  ta.focus();
  ta.select();
  // For iOS
  ta.setSelectionRange(0,999999);
  let success=false;
  try{success=document.execCommand('copy');}catch(e){}
  document.body.removeChild(ta);
  if(success){
    showCopySuccess(id);
  } else {
    // Last resort — show text in a popup so user can manually copy
    showCopyModal(text);
  }
}

function showCopySuccess(id){
  // Flash the button green briefly
  S.copiedId=id;render();

}

function showCopyModal(text){
  // Show a modal with the text so user can manually copy
  set({showCopyModal:true,copyModalText:text});
}

function closeCopyModal(){

}

async function syncHistoryFromSheet(){
  if(!localStorage.getItem(SCRIPT_KEY)){
    alert('Google Sheets not connected.\nGo to Journal tab → Setup Google Sheets first.');
    return;
  }
  set({histSyncing:true,histSyncMsg:'⏳ Loading history from Google Sheets...'});
  try{
    const sheetHistory=await loadHistoryFromSheet();
    if(!sheetHistory||!sheetHistory.length){
      set({histSyncing:false,histSyncMsg:'⚠️ No history found in Google Sheets yet.'});
      setTimeout(()=>set({histSyncMsg:''}),3000);
      return;
    }
    // Merge: combine sheet history with local history, deduplicate by id
    const localIds=new Set(S.history.map(h=>String(h.id)));
    const newEntries=sheetHistory.filter(h=>!localIds.has(String(h.id)));
    const merged=[...S.history,...newEntries]
      .sort((a,b)=>Number(b.id)-Number(a.id))
      .slice(0,50);
    localStorage.setItem('ah',JSON.stringify(merged));
    const added=newEntries.length;
    set({history:merged,histSyncing:false,
      histSyncMsg:`✅ Synced! ${added} new entr${added===1?'y':'ies'} loaded from Sheets.`});
    setTimeout(()=>set({histSyncMsg:''}),4000);
  }catch(e){
    set({histSyncing:false,histSyncMsg:'❌ Sync failed. Check your connection.'});
    setTimeout(()=>set({histSyncMsg:''}),3000);
  }
}

async function pushAllHistoryToSheet(){
  if(!localStorage.getItem(SCRIPT_KEY)){
    alert('Google Sheets not connected.');
    return;
  }
  if(!S.history.length){alert('No local history to push.');return;}
  set({histSyncing:true,histSyncMsg:'⏳ Pushing all history to Google Sheets...'});
  let count=0;
  for(const entry of S.history){
    await syncHistoryEntry(entry).catch(()=>{});
    count++;
  }
  set({histSyncing:false,histSyncMsg:`✅ Pushed ${count} entries to Google Sheets!`});
  setTimeout(()=>set({histSyncMsg:''}),4000);
}

function copyAllHistoryReport(){
  if(!S.history.length)return alert('No history to copy.');
  const lines=['========================================','ANALYSIS HISTORY REPORT','Generated: '+new Date().toLocaleString(),'========================================',''];
  S.history.forEach((h,i)=>{
    const mc=MARKETS[h.market]||MARKETS.crypto;
    const d=extractAnalysisData(h.analysis||'');
    lines.push(`--- #${i+1}: ${h.pair} (${mc.label}) ---`);
    lines.push(`Date: ${h.date} | My bias: ${h.notes||'Not stated'}`);
    lines.push(`Direction: ${d.direction} | Trend: ${d.trendAlign} | Bias: ${d.bias} | Score: ${d.setupScore}/10`);
    lines.push(`Trap: ${d.trapScore} | RF: ${h.rfStatus||'?'} | Weekend: ${d.weekendRisk}`);
    lines.push(`Candle: ${d.candleSignal} | S/R: ${d.srWarning}`);
    lines.push(`Entry: ${d.entry} | SL: ${d.sl} | TP1: ${d.tp1} | TP2: ${d.tp2} | R:R: ${d.rr}`);
    lines.push('');
  });
  lines.push('========================================');
  lines.push('Please review and help me:');
  lines.push('1. Identify patterns in my bias accuracy');
  lines.push('2. Flag setups I should reconsider');
  lines.push('3. Suggest price alerts to set');
  lines.push('4. Highlight any rule violations');
  lines.push('========================================');
  const text=lines.join('\n');
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(text)
      .then(()=>alert('✅ All history copied!\nPaste in Claude chat.'))
      .catch(()=>mobileCopyFallback(text,null));
  } else {
    mobileCopyFallback(text,null);
  }
}

    +row('📊','WLD Trade 4 example','Bounce 0.4151→0.4274: Vol 50% below MA50 ❌ Weak bodies ❌ No new HH ❌ = 3/3 fake = dead cat confirmed = held short = correct ✅'));

    html+=sec('FIBONACCI ENTRY','Limit order at pullback after swing break');
    html+=card(row('📐','Draw fib','SHORT: LL to HH. LONG: HH to LL. Wait for pullback to these levels.')
    +row('₿','Crypto + Gold','LIMIT below 0.618 or at 0.705/0.730.')
    +row('💱','Forex non-JPY','LIMIT at 0.618. Also check S/R at entry TF.')
    +row('🇯🇵','Forex JPY','LIMIT at 0.730. Also check S/R at entry TF.')
    +row('⚡','Market order','A+ setup ONLY + pullback hits strong S/R. Default = LIMIT always.')
    +row('🛡️','Auto-protection','No pullback to Fib = no fill = protected automatically.'));

    html+=sec('SL + PARTIAL CLOSE RULES','Structure-based, professional management');
    html+=card(row('🛑','Stop Loss','SHORT: above HH + 25 pips. LONG: below LL + 25 pips. Exact structural level.')
    +row('🏆','WITH TREND','TP1 at first neckline = close 50%. Move SL to breakeven. TP2 at second neckline = close 50%. A+ bonus: keep 25% running past TP2.')
    +row('⚠️','COUNTER TREND','TP1 at first neckline (1:1) = close 50% MANDATORY. Move SL to breakeven. TP2 at 1.5:1 = close 50%. No continuation re-entry.')
    +row('❌','AGAINST TREND','TP1 only = close 100%. Done. No TP2. No holding.')
    +row('💡','Why partial close','Locks profit at TP1. Removes emotional pressure. Remaining 50% runs freely. Worst case after TP1 = breakeven. Best case = full TP2.'));

    html+=sec('RR CALCULATION','Always calculate before entering');
    html+=card(row('📐','How to calculate','Risk = Entry to SL distance. TP1 reward = Entry to TP1. TP2 reward = Entry to TP2. RR = Reward divided by Risk.')
    +row('✅','If RR valid','PROCEED with entry at Fib pullback.')
    +row('❌','If RR invalid','SKIP. Wait for better neckline or better price. No exceptions.')
    +row('📏','25 pips','Crypto: 0.0025. Gold: $2.50. Forex non-JPY: 0.00025. Forex JPY: 0.025.'));

    html+=sec('INVALIDATION','Exit immediately — one signal is enough');
    html+=card(row('🛑','SHORT invalid','Price closes ABOVE HH+25pips. OR 4H bullish AMF. OR neckline breaks huge volume.')
    +row('🛑','LONG invalid','Price closes BELOW LL+25pips. OR 4H bearish AMF. OR neckline breaks huge volume.')
    +row('⚡','Rule','ONE signal = EXIT. Immediately. No waiting. No hoping.')
    +row('📊','App shows you','Every analysis gives exact invalidation prices. Know them before you enter.'));

    html+=sec('CONTINUATION ENTRY','Same system, new neckline');
    html+=card(row('🔄','After TP1 hit','TP1 neckline becomes your new entry neckline. Price may continue to TP2 directly or pull back first.')
    +row('✅','Valid when','Weekly AMF intact + 1D/4H AMF still confirm + new neckline at pullback + low volume pullback + 3/3 swing break.')
    +row('❌','Stop when','Opposite AMF in pullback. Neckline breaks huge volume against trend. Weekly changes direction.')
    +row('🗺️','New price road','Build fresh neckline map from new entry neckline. TP1 and TP2 = next two necklines.'));

    html+=sec('WEEKEND RULES','Every Saturday and Sunday');
    html+=card(row('⚠️','Grade -1 + Size -50%','All setups reduced. Always.')
    +row('❌','Counter-trend','NEVER on weekend.')
    +row('📊','Volume <30%','Skip entirely.')
    +row('🕐','Best action','Map necklines. Set alerts. Wait Monday London open 2PM UTC+7.'));

    html+=sec('GRADE SYSTEM','Simple and clear');
    html+=card(['A+ = With trend + 3/3 swing break + significant neckline + RR met → Full size 1-2%','B  = With trend + 2/3 swing break OR counter-trend + 3/3 + 1.5:1 RR → Half size 0.5-1%','C  = Counter-trend + 2/3 swing break → Quarter size','SKIP = Against 2+ HTF | 0-1 swing break | RR fails | Weekend counter-trend'].map((t,i)=>`<div style="display:flex;gap:8px;padding:5px 0;border-bottom:${i<3?'1px solid #1e293b':'none'}"><span style="color:#4ade80;font-size:11px;flex-shrink:0">✓</span><span style="font-size:11px;color:#94a3b8">${t}</span></div>`).join(''),'#1e3a1e');

    html+=sec('YOUR WORKFLOW','Every trade, every time');
    html+=card(['1. Screenshot after 4H closes — London open 2PM UTC+7 best','2. Upload to Analyse tab — type your bias','3. Read Executive Summary FIRST','4. Build Neckline Map — find TP1 and TP2 before entering','5. Check Swing Break 3 rules — 🟢/🟡/🔴','6. Check RR to TP1 AND TP2 — if fails = SKIP','7. Know Invalidation prices before entering','8. ENTER: LIMIT at Fib / WAIT: Set Alert / SKIP: Move on','9. At TP1: close 50% + move SL to breakeven ALWAYS','10. Hold 50% to TP2 | Log in Journal after close'].map((t,i)=>`<div style="display:flex;gap:8px;padding:5px 0;border-bottom:${i<9?'1px solid #1e293b':'none'}"><span style="color:#4ade80;font-size:11px;font-weight:700;flex-shrink:0">${i+1}</span><span style="font-size:11px;color:#94a3b8">${t}</span></div>`).join(''),'#1e3a1e');

    html+=`<div style="background:#0a1f0d;border:1px solid #166534;border-radius:10px;padding:13px;margin-top:6px;text-align:center">
      <div style="font-size:11px;color:#4ade80;font-weight:800;margin-bottom:6px">🎯 THE GOAL</div>
      <div style="font-size:11px;color:#94a3b8;line-height:1.8">Price moves neckline to neckline.<br>Enter at one station. Exit at the next.<br>With trend: TP1 50% → BE → TP2 50%.<br>Log every trade. Review every 50 trades.<br><strong style="color:#4ade80">Target: 70%+ win rate proven by real data.</strong></div>
      <div style="margin-top:8px;font-size:10px;color:#166534;font-weight:700">"No perfect trade. Accept and respect all the rules." 🙏</div>
    </div>`;
  }

  // ── STATS ──
  if(S.screen==='stats'){
    html+=`<div style="font-size:14px;font-weight:800;color:#f1f5f9;margin-bottom:11px">Win Rate & Pattern Tracker</div>`;
    const st=stats;
    if(!st)html+=`<div class="loading"><div style="font-size:20px;margin-bottom:6px">📈</div>No trades yet. Log trades to see patterns.</div>`;
    else{
      const wrc=parseFloat(st.wr)>=70?'#4ade80':parseFloat(st.wr)>=50?'#fbbf24':'#f87171';
      html+=`<div class="card" style="border-color:#1e3a1e;text-align:center"><span class="lbl">OVERALL WIN RATE</span>
        <div style="font-size:46px;font-weight:900;color:${wrc};line-height:1">${st.wr}%</div>
        <div style="font-size:10px;color:#475569;margin-top:3px">Target 70% ${parseFloat(st.wr)>=70?'✅ Achieved!':'· Need '+(70-parseFloat(st.wr)).toFixed(1)+'% more'}</div>
        <div class="pbar-bg"><div class="pbar" style="width:${Math.min(parseFloat(st.wr),100)}%;background:${wrc}"></div></div>
      </div>`;

      html+=`<div class="stat-grid">${[['Total',st.total,'#94a3b8'],['Wins',st.wins,'#4ade80'],['Losses',st.losses,'#f87171'],['BE',st.be,'#fbbf24'],...(st.expired?[['⏳ Expired',st.expired,'#64748b']]:[]),...(st.skipped?[['⏭ Skipped',st.skipped,'#fbbf24']]:[]),...(st.missed?[['❌ Missed',st.missed,'#fb923c']]:[])].map(([l,v,c])=>`<div class="stat-box"><div style="font-size:15px;font-weight:800;color:${c}">${v}</div><div style="font-size:8px;color:#475569;margin-top:1px">${l}</div></div>`).join('')}</div>`;
      if(st.expired)html+=`<div style="font-size:8px;color:#475569;margin:-6px 0 10px;text-align:center">Expired/Skipped/Missed = setups that didn't become trades — excluded from win rate, tracked for discipline & map-accuracy stats.</div>`;

      html+=`<div class="card"><span class="lbl">KEY PATTERN STATS</span>
        ${[['A+ Setup WR',st.aPWR,'8/8 conditions'],['B Setup WR',st.bWR,'6-7/8'],['With Trend WR',st.byTrend?.WITH?((st.byTrend.WITH.wins/st.byTrend.WITH.total)*100).toFixed(1):'N/A','Same dir 1D+4H'],['Against Trend WR',st.byTrend?.AGAINST?((st.byTrend.AGAINST.wins/st.byTrend.AGAINST.total)*100).toFixed(1):'N/A','Counter-trend'],['Trap 3/3 WR',st.byTrap?.['3/3']?((st.byTrap['3/3'].wins/st.byTrap['3/3'].total)*100).toFixed(1):'N/A','Full trap confirmed'],['Avg R:R',st.avgRR?st.avgRR+'x':'N/A','Actual achieved']].map(([label,val,sub],i)=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:${i<5?'1px solid #1e293b':'none'}"><div><div style="font-size:11px;font-weight:700;color:#e2e8f0">${label}</div><div style="font-size:9px;color:#475569">${sub}</div></div><div style="font-size:14px;font-weight:800;color:${val==='N/A'||val==='N/Ax'?'#64748b':parseFloat(val)>=70?'#4ade80':parseFloat(val)>=50?'#fbbf24':'#f87171'}">${val}${val!=='N/A'&&val!=='N/Ax'&&!val.includes('x')?'%':''}</div></div>`).join('')}
      </div>`;

      if(Object.keys(st.byS).length>0)html+=`<div class="card"><span class="lbl">BY SESSION</span>${Object.entries(st.byS).sort(([,a],[,b])=>b.total-a.total).map(([s,d])=>wrRow(s,d,d.total+' trades')).join('')}</div>`;
      if(Object.keys(st.byTrap).length>0)html+=`<div class="card"><span class="lbl">BY TRAP SCORE</span>${['3/3','2/3','1/3','0/3'].filter(k=>st.byTrap[k]).map(k=>wrRow('Trap '+k,st.byTrap[k],st.byTrap[k].total+' trades')).join('')}</div>`;
      if(Object.keys(st.byM).length>1)html+=`<div class="card"><span class="lbl">BY MARKET</span>${Object.entries(st.byM).map(([mk,d])=>{const mc=MARKETS[mk]||MARKETS.crypto;return wrRow(mc.icon+' '+mc.label,d,d.total+' trades');}).join('')}</div>`;
      html+=`<div class="card"><span class="lbl">BY PAIR</span>${Object.entries(st.byP).map(([p,d])=>{const mc=MARKETS[d.market||'crypto']||MARKETS.crypto;return wrRow(mc.icon+' '+p,d,d.total+' trades');}).join('')}</div>`;
      html+=`<div class="card"><span class="lbl">TOTAL PNL</span><div style="font-size:22px;font-weight:800;color:${parseFloat(st.pnl)>=0?'#4ade80':'#f87171'}">${parseFloat(st.pnl)>=0?'+':''}${st.pnl}</div></div>`;

      html+=`<div class="card" style="border-color:#2d1b4e"><span class="lbl" style="color:#a78bfa">🧠 PATTERN INSIGHT</span>
        <div style="font-size:10px;color:#64748b;line-height:1.75">${parseFloat(st.wr)>=70?'✅ Hitting 70%+. Maintain A+ discipline.':parseFloat(st.wr)>=50?'⚠️ Below 70%. A+ setups only — skip B and C.':'❌ Under 50%. Review all losses. Respect R:R rule.'}${st.aPWR!=='N/A'&&parseFloat(st.aPWR)>parseFloat(st.wr)?' A+ WR ('+st.aPWR+'%) beats overall — be more selective.':''}${st.byTrend?.WITH&&st.byTrend?.AGAINST&&((st.byTrend.WITH.wins/st.byTrend.WITH.total)>(st.byTrend.AGAINST.wins/st.byTrend.AGAINST.total))?' With-trend outperforms counter-trend — prioritise trend alignment.':''}</div>
      </div>`;

      html+=`<div class="card" style="border-color:#1e3a5f"><span class="lbl" style="color:#60a5fa">🤖 AI PATTERN REVIEW</span>
        <div style="font-size:9px;color:#475569;margin-bottom:9px;line-height:1.5">Get AI analysis of your patterns with specific rule adjustments.</div>
        ${!S.review&&!S.revLoading?`<button onclick="runReview()" style="width:100%;padding:10px;border-radius:8px;border:none;background:linear-gradient(135deg,#60a5fa,#3b82f6);color:#fff;font-size:11px;font-weight:700;cursor:pointer">🤖 Get AI Pattern Review</button>`:''}
        ${S.revLoading?`<div style="text-align:center;padding:12px;color:#64748b;font-size:11px">⏳ Analysing your patterns...</div>`:''}
        ${S.review?`<div class="out" style="margin-bottom:9px">${S.review}</div><button onclick="set({review:null})" class="btn-ghost" style="margin-top:0">↺ Re-analyse</button>`:''}
      </div>`;

      html+=`<div class="card"><span class="lbl">📋 COPY REPORT FOR CLAUDE CHAT</span>
        <div style="font-size:9px;color:#475569;margin-bottom:8px">Paste in chat so I can update rules based on your real data.</div>
        <button onclick="copyReport()" style="width:100%;padding:9px;border-radius:8px;border:none;background:linear-gradient(135deg,#60a5fa,#3b82f6);color:#fff;font-size:11px;font-weight:700;cursor:pointer">📋 Copy Report</button>
      </div>`;
    }
  }

  document.getElementById('app').innerHTML=html;
}


function copyReport(){
  const st=calcStats();if(!st)return alert('No trades to report.');
  const wTr=st.byTrend?.WITH?((st.byTrend.WITH.wins/st.byTrend.WITH.total)*100).toFixed(1):'N/A';
  const aTr=st.byTrend?.AGAINST?((st.byTrend.AGAINST.wins/st.byTrend.AGAINST.total)*100).toFixed(1):'N/A';
  const t3=st.byTrap?.['3/3']?((st.byTrap['3/3'].wins/st.byTrap['3/3'].total)*100).toFixed(1):'N/A';
  const bestS=Object.entries(st.byS||{}).sort(([,a],[,b])=>((b.wins/b.total)-(a.wins/a.total)))[0];
  const text=`=== TRADING JOURNAL REVIEW ===\nTotal: ${st.total} trades | WR: ${st.wr}% | Target: 70%\nWins: ${st.wins} | Losses: ${st.losses} | BE: ${st.be} | PNL: ${st.pnl}\n\nA+ WR: ${st.aPWR}% | B WR: ${st.bWR}%\nWith-Trend WR: ${wTr}% | Against-Trend WR: ${aTr}%\nTrap 3/3 WR: ${t3}% | Avg R:R: ${st.avgRR||'N/A'}x\nBest Session: ${bestS?bestS[0]+' ('+((bestS[1].wins/bestS[1].total)*100).toFixed(0)+'%)':'N/A'}\nBy Pair: ${Object.entries(st.byP).map(([p,d])=>p+':'+((d.wins/d.total)*100).toFixed(0)+'%').join(' | ')}\nBy Session: ${Object.entries(st.byS||{}).map(([s,d])=>s+':'+((d.wins/d.total)*100).toFixed(0)+'%').join(' | ')}\n\nPlease analyse this data and suggest specific rule adjustments to help me reach 70%+ win rate.`;
  navigator.clipboard?.writeText(text).then(()=>alert('Report copied! Paste in Claude chat.')).catch(()=>alert('Copy failed — screenshot the stats instead.'));
}

render();
// Cross-device: silently pull alerts from the Sheet on load, then re-render
if(localStorage.getItem(SCRIPT_KEY)){pullAlerts(true).then(ok=>{if(ok)render();});}
</script>
</body>
</html>
