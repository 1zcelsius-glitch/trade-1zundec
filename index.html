async function syncToSheet(trade){
  const url=localStorage.getItem(SCRIPT_KEY);
  if(!url)return false;
  try{
    await fetch(url,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({action:'addTrade',trade:{
        date:trade.date,pair:trade.pair,market:trade.market,
        direction:trade.direction,grade:trade.grade,result:trade.result,
        entry:trade.entry,sl:trade.sl,tp:trade.tp,pnl:trade.pnl,
        rrActual:trade.rrActual,trapScore:trade.trapScore,
        trendAlign:trade.trendAlign,session:trade.session,
        checklistScore:Object.values(trade.checklist||{}).filter(Boolean).length+'/8',
        analysisSnapshot:(trade.analysisSnapshot||'').slice(0,200),
        notes:trade.notes||''
      }})
    });
    return true;
  }catch{return false;}
}

async function loadFromSheet(){
  const url=localStorage.getItem(SCRIPT_KEY);
  if(!url)return null;
  try{
    const r=await fetch(url+'?action=getTrades');
    const d=await r.json();
    return d.trades||null;
  }catch{return null;}
}

function calcStats(){
  const t=S.journal.trades;if(!t.length)return null;
  const wins=t.filter(x=>x.result==='WIN').length,losses=t.filter(x=>x.result==='LOSS').length,be=t.filter(x=>x.result==='BE').length;
  const aP=t.filter(x=>x.grade==='A+'),bP=t.filter(x=>x.grade==='B');
  const byM={},byP={},byS={},byTrap={},byTrend={};
  t.forEach(x=>{
    const mk=x.market||'crypto';if(!byM[mk])byM[mk]={wins:0,total:0};byM[mk].total++;if(x.result==='WIN')byM[mk].wins++;
    if(!byP[x.pair])byP[x.pair]={wins:0,total:0,market:mk};byP[x.pair].total++;if(x.result==='WIN')byP[x.pair].wins++;
    const ss=x.session||'?';if(!byS[ss])byS[ss]={wins:0,total:0};byS[ss].total++;if(x.result==='WIN')byS[ss].wins++;
    const tr=x.trapScore||'?';if(!byTrap[tr])byTrap[tr]={wins:0,total:0};byTrap[tr].total++;if(x.result==='WIN')byTrap[tr].wins++;
    const td=x.trendAlign||'?';if(!byTrend[td])byTrend[td]={wins:0,total:0};byTrend[td].total++;if(x.result==='WIN')byTrend[td].wins++;
  });
  const rrVals=t.filter(x=>x.rrActual&&!isNaN(parseFloat(x.rrActual))).map(x=>parseFloat(x.rrActual));
  return{total:t.length,wins,losses,be,wr:((wins/t.length)*100).toFixed(1),
    pnl:t.reduce((s,x)=>s+(parseFloat(x.pnl)||0),0).toFixed(2),
    aPWR:aP.length?((aP.filter(x=>x.result==='WIN').length/aP.length)*100).toFixed(1):'N/A',
    bWR:bP.length?((bP.filter(x=>x.result==='WIN').length/bP.length)*100).toFixed(1):'N/A',
    avgRR:rrVals.length?(rrVals.reduce((a,b)=>a+b,0)/rrVals.length).toFixed(2):null,
    byM,byP,byS,byTrap,byTrend};
}

        <div class="pbar-bg"><div class="pbar" style="width:${Math.min(parseFloat(st.wr),100)}%;background:${wrc}"></div></div>
      </div>`;

      html+=`<div class="stat-grid">${[['Total',st.total,'#94a3b8'],['Wins',st.wins,'#4ade80'],['Losses',st.losses,'#f87171'],['BE',st.be,'#fbbf24']].map(([l,v,c])=>`<div class="stat-box"><div style="font-size:15px;font-weight:800;color:${c}">${v}</div><div style="font-size:8px;color:#475569;margin-top:1px">${l}</div></div>`).join('')}</div>`;

      html+=`<div class="card"><span class="lbl">KEY PATTERN STATS</span>
        ${[['A+ Setup WR',st.aPWR,'8/8 conditions'],['B Setup WR',st.bWR,'6-7/8'],['With Trend WR',st.byTrend?.WITH?((st.byTrend.WITH.wins/st.byTrend.WITH.total)*100).toFixed(1):'N/A','Same dir 1D+4H'],['Against Trend WR',st.byTrend?.AGAINST?((st.byTrend.AGAINST.wins/st.byTrend.AGAINST.total)*100).toFixed(1):'N/A','Counter-trend'],['Trap 3/3 WR',st.byTrap?.['3/3']?((st.byTrap['3/3'].wins/st.byTrap['3/3'].total)*100).toFixed(1):'N/A','Full trap confirmed'],['Avg R:R',st.avgRR?st.avgRR+'x':'N/A','Actual achieved']].map(([label,val,sub],i)=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:${i<5?'1px solid #1e293b':'none'}"><div><div style="font-size:11px;font-weight:700;color:#e2e8f0">${label}</div><div style="font-size:9px;color:#475569">${sub}</div></div><div style="font-size:14px;font-weight:800;color:${val==='N/A'||val==='N/Ax'?'#64748b':parseFloat(val)>=70?'#4ade80':parseFloat(val)>=50?'#fbbf24':'#f87171'}">${val}${val!=='N/A'&&val!=='N/Ax'&&!val.includes('x')?'%':''}</div></div>`).join('')}
      </div>`;

      if(Object.keys(st.byS).length>0)html+=`<div class="card"><span class="lbl">BY SESSION</span>${Object.entries(st.byS).sort(([,a],[,b])=>b.total-a.total).map(([s,d])=>wrRow(s,d,d.total+' trades')).join('')}</div>`;
      if(Object.keys(st.byTrap).length>0)html+=`<div class="card"><span class="lbl">BY TRAP SCORE</span>${['3/3','2/3','1/3','0/3'].filter(k=>st.byTrap[k]).map(k=>wrRow('Trap '+k,st.byTrap[k],st.byTrap[k].total+' trades')).join('')}</div>`;
      if(Object.keys(st.byM).length>1)html+=`<div class="card"><span class="lbl">BY MARKET</span>${Object.entries(st.byM).map(([mk,d])=>{const mc=MARKETS[mk]||MARKETS.crypto;return wrRow(mc.icon+' '+mc.label,d,d.total+' trades');}).join('')}</div>`;
      html+=`<div class="card"><span class="lbl">BY PAIR</span>${Object.entries(st.byP).map(([p,d])=>{const mc=MARKETS[d.market||'crypto']||MARKETS.crypto;return wrRow(mc.icon+' '+p,d,d.total+' trades');}).join('')}</div>`;
      html+=`<div class="card"><span class="lbl">TOTAL PNL</span><div style="font-size:22px;font-weight:800;color:${parseFloat(st.pnl)>=0?'#4ade80':'#f87171'}">${parseFloat(st.pnl)>=0?'+':''}${st.pnl}</div></div>`;

      html+=`<div class="card" style="border-color:#2d1b4e"><span class="lbl" style="color:#a78bfa">🧠 PATTERN INSIGHT</span>
        <div style="font-size:10px;color:#64748b;line-height:1.75">${parseFloat(st.wr)>=70?'✅ Hitting 70%+. Maintain A+ discipline.':parseFloat(st.wr)>=50?'⚠️ Below 70%. A+ setups only — skip B and C.':'❌ Under 50%. Review all losses. Respect R:R rule.'}${st.aPWR!=='N/A'&&parseFloat(st.aPWR)>parseFloat(st.wr)?' A+ WR ('+st.aPWR+'%) beats overall — be more selective.':''}${st.byTrend?.WITH&&st.byTrend?.AGAINST&&((st.byTrend.WITH.wins/st.byTrend.WITH.total)>(st.byTrend.AGAINST.wins/st.byTrend.AGAINST.total))?' With-trend outperforms counter-trend — prioritise trend alignment.':''}</div>
      </div>`;

      html+=`<div class="card" style="border-color:#1e3a5f"><span class="lbl" style="color:#60a5fa">🤖 AI PATTERN REVIEW</span>
        <div style="font-size:9px;color:#475569;margin-bottom:9px;line-height:1.5">Get AI analysis of your patterns with specific rule adjustments.</div>
        ${!S.review&&!S.revLoading?`<button onclick="runReview()" style="width:100%;padding:10px;border-radius:8px;border:none;background:linear-gradient(135deg,#60a5fa,#3b82f6);color:#fff;font-size:11px;font-weight:700;cursor:pointer">🤖 Get AI Pattern Review</button>`:''}
        ${S.revLoading?`<div style="text-align:center;padding:12px;color:#64748b;font-size:11px">⏳ Analysing your patterns...</div>`:''}
        ${S.review?`<div class="out" style="margin-bottom:9px">${S.review}</div><button onclick="set({review:null})" class="btn-ghost" style="margin-top:0">↺ Re-analyse</button>`:''}
      </div>`;

      html+=`<div class="card"><span class="lbl">📋 COPY REPORT FOR CLAUDE CHAT</span>
        <div style="font-size:9px;color:#475569;margin-bottom:8px">Paste in chat so I can update rules based on your real data.</div>
        <button onclick="copyReport()" style="width:100%;padding:9px;border-radius:8px;border:none;background:linear-gradient(135deg,#60a5fa,#3b82f6);color:#fff;font-size:11px;font-weight:700;cursor:pointer">📋 Copy Report</button>
      </div>`;
    }
  }

  document.getElementById('app').innerHTML=html;
}

function switchToEntry(){if(!S.entry)runEntry();else set({screen:'entry'});}

function copyReport(){
  const st=calcStats();if(!st)return alert('No trades to report.');
  const wTr=st.byTrend?.WITH?((st.byTrend.WITH.wins/st.byTrend.WITH.total)*100).toFixed(1):'N/A';
  const aTr=st.byTrend?.AGAINST?((st.byTrend.AGAINST.wins/st.byTrend.AGAINST.total)*100).toFixed(1):'N/A';
  const t3=st.byTrap?.['3/3']?((st.byTrap['3/3'].wins/st.byTrap['3/3'].total)*100).toFixed(1):'N/A';
  const bestS=Object.entries(st.byS||{}).sort(([,a],[,b])=>((b.wins/b.total)-(a.wins/a.total)))[0];
  const text=`=== TRADING JOURNAL REVIEW ===\nTotal: ${st.total} trades | WR: ${st.wr}% | Target: 70%\nWins: ${st.wins} | Losses: ${st.losses} | BE: ${st.be} | PNL: ${st.pnl}\n\nA+ WR: ${st.aPWR}% | B WR: ${st.bWR}%\nWith-Trend WR: ${wTr}% | Against-Trend WR: ${aTr}%\nTrap 3/3 WR: ${t3}% | Avg R:R: ${st.avgRR||'N/A'}x\nBest Session: ${bestS?bestS[0]+' ('+((bestS[1].wins/bestS[1].total)*100).toFixed(0)+'%)':'N/A'}\nBy Pair: ${Object.entries(st.byP).map(([p,d])=>p+':'+((d.wins/d.total)*100).toFixed(0)+'%').join(' | ')}\nBy Session: ${Object.entries(st.byS||{}).map(([s,d])=>s+':'+((d.wins/d.total)*100).toFixed(0)+'%').join(' | ')}\n\nPlease analyse this data and suggest specific rule adjustments to help me reach 70%+ win rate.`;
  navigator.clipboard?.writeText(text).then(()=>alert('Report copied! Paste in Claude chat.')).catch(()=>alert('Copy failed — screenshot the stats instead.'));
}

render();
</script>
</body>
</html>
