function saveAlerts(alerts){
  localStorage.setItem('ta_alerts',JSON.stringify(alerts));
  set({alerts});
}

function addAlert(alert){
  const a={
    id:Date.now(),
    pair:alert.pair||AP2()||'',
    market:alert.market||S.market,
    direction:alert.direction||'SHORT',
    alertPrice:alert.alertPrice||'',
    condition:alert.condition||'Price reaches level',
    entryTF:alert.entryTF||'1H',
    htfTF:alert.htfTF||'4H',
    sl:alert.sl||'',

    createdAt:new Date().toLocaleString(),
    triggeredAt:null,
    recheckResult:null,
    tradeResult:null,
    notes:alert.notes||'',
  };
  const newAlerts=[a,...S.alerts];

  if(localStorage.getItem(SCRIPT_KEY)){
    gasPost({action:'addAlert',alert:a}).catch(()=>{});

function triggerAlert(id){
  const alerts=S.alerts.map(a=>a.id===id?{...a,status:'TRIGGERED',triggeredAt:new Date().toLocaleString()}:a);

  // Open recheck for this alert
  const alert=alerts.find(a=>a.id===id);
  set({screen:'recheck',recheckAlert:alert,recheckResult:null,images:{W1:null,M15:null,H1:null,H4:null,D1:null},notes:'Price hit my alert. Checking entry confirmation.'});

  if(localStorage.getItem(SCRIPT_KEY)){
    gasPost({action:'updateAlert',id,status:'TRIGGERED',triggeredAt:new Date().toLocaleString()}).catch(()=>{});
  }
}

function updateAlertStatus(id,status,extra={}){

// ── RE-CHECK ENTRY ──
const RECHECK_P=`You are a precise trade entry confirmation analyst. A trader already did a full 5-TF analysis earlier and set an alert. The alert price level has now been hit. Your job is ONLY to confirm or reject the entry — not redo the full analysis.

TASK: Check the uploaded charts (entry TF + HTF confirmation) and answer:
1. Is there a valid HTF candle at the alert S/R level?
2. Is the entry TF confirming direction?
3. Is this a real move or fake/trap?
4. Should the trader enter NOW, WAIT a bit more, or SKIP?

BE CONCISE AND DECISIVE. The trader needs a fast clear answer.

FORMAT:
⚡ ENTRY RE-CHECK
Pair: | Direction: | Alert level: | Current price:
HTF candle: [pattern at level | valid✅/invalid❌ | strength ⭐/⭐⭐/⭐⭐⭐]
Entry TF: [confirms direction? | MACD | structure]
Fake move check: GENUINE✅ / FAKE⚠️ / UNCLEAR🕐
Trap score: X/3

🎯 DECISION: ENTER NOW✅ / WAIT⏳ / SKIP❌
Entry: | SL: | TP1: | TP2: | R:R:
Reason: [one clear sentence why]
[If WAIT: exactly what to wait for]
[If SKIP: what invalidated the setup]
⚠️Not financial advice.`;

async function runRecheck(){
  const up=Object.entries(S.images).filter(([,v])=>v);
  if(!up.length){set({error:'Upload entry TF + HTF charts to recheck.'});return;}
  set({recheckLoading:true,error:null,recheckResult:null});
  try{
    const imgs=up.map(([,d])=>i2b(d));
    const alert=S.recheckAlert;
    const context=alert?`
ORIGINAL ANALYSIS CONTEXT:
Pair: ${alert.pair} | Direction planned: ${alert.direction}
Alert level: ${alert.alertPrice} | SL: ${alert.sl} | TP1: ${alert.tp1} | TP2: ${alert.tp2}
Entry TF: ${alert.entryTF} | HTF confirmation: ${alert.htfTF}
Original plan: ${alert.originalAnalysisSummary||'See charts'}
Charts uploaded: ${up.map(([tf])=>tf).join(', ')}
`:'Charts: '+up.map(([tf])=>tf).join(', ');

    const d=await api({model:'claude-sonnet-4-6',max_tokens:1500,system:RECHECK_P,
      messages:[{role:'user',content:[...imgs,{type:'text',text:context}]}]});
    const result=d.content?.map(b=>b.text||'').join('\n')||'No response.';

    // Save recheck result to alert
    if(alert){
      const decision=result.includes('ENTER NOW')?'ENTERED':result.includes('SKIP')?'SKIPPED':'WAIT';
      const alerts=S.alerts.map(a=>a.id===alert.id?{...a,recheckResult:result,recheckDecision:decision,recheckAt:new Date().toLocaleString()}:a);
      saveAlerts(alerts);
      // Sync to sheets
      if(localStorage.getItem(SCRIPT_KEY)){
        gasPost({action:'updateAlert',id:alert.id,recheckResult:result.slice(0,500),recheckDecision:decision,recheckAt:new Date().toLocaleString()}).catch(()=>{});
      }
      // Save recheck to history for data collection
      const recheckEntry={
        id:Date.now(),
        date:new Date().toLocaleString(),
        pair:alert.pair,
        market:alert.market||S.market,
        notes:`RECHECK: ${alert.direction} at ${alert.alertPrice}. Decision: ${decision}`,
        analysis:result,
        rfStatus:'CLEAR',
        newsSentiment:'neutral',
        type:'recheck',// mark as recheck not full analysis
        alertId:alert.id,
      };
      const newHistory=[recheckEntry,...S.history].slice(0,50);
      localStorage.setItem('ah',JSON.stringify(newHistory));
      set({recheckResult:result,recheckLoading:false,history:newHistory,recheckAlert:{...alert,recheckResult:result,recheckDecision:decision}});
    } else {
      set({recheckResult:result,recheckLoading:false});
    }
  }catch(e){
    set({error:e.message||'Recheck failed.',recheckLoading:false});
  }
}

async function gasPost(body){
  const url=localStorage.getItem(SCRIPT_KEY);
  if(!url)return false;
  try{
    await fetch(url,{method:'POST',mode:'no-cors',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(body)});
    return true;
  }catch{return false;}
}

async function gasGet(action){
  const url=localStorage.getItem(SCRIPT_KEY);
  if(!url)return null;
  try{
    const r=await fetch(url+'?action='+action);
    const d=await r.json();
    return d;
  }catch{return null;}
}

function calcStats(){
  const t=S.journal.trades;if(!t.length)return null;
  const wins=t.filter(x=>x.result==='WIN').length,losses=t.filter(x=>x.result==='LOSS').length,be=t.filter(x=>x.result==='BE').length;
  const aP=t.filter(x=>x.grade==='A+'),bP=t.filter(x=>x.grade==='B');
  const byM={},byP={},byS={},byTrap={},byTrend={};
  t.forEach(x=>{
    const mk=x.market||'crypto';if(!byM[mk])byM[mk]={wins:0,total:0};byM[mk].total++;if(x.result==='WIN')byM[mk].wins++;
    if(!byP[x.pair])byP[x.pair]={wins:0,total:0,market:mk};byP[x.pair].total++;if(x.result==='WIN')byP[x.pair].wins++;
    const ss=x.session||'?';if(!byS[ss])byS[ss]={wins:0,total:0};byS[ss].total++;if(x.result==='WIN')byS[ss].wins++;
    const tr=x.trapScore||'?';if(!byTrap[tr])byTrap[tr]={wins:0,total:0};byTrap[tr].total++;if(x.result==='WIN')byTrap[tr].wins++;
    const td=x.trendAlign||'?';if(!byTrend[td])byTrend[td]={wins:0,total:0};byTrend[td].total++;if(x.result==='WIN')byTrend[td].wins++;
  });
  const rrVals=t.filter(x=>x.rrActual&&!isNaN(parseFloat(x.rrActual))).map(x=>parseFloat(x.rrActual));
  return{total:t.length,wins,losses,be,wr:((wins/t.length)*100).toFixed(1),
    pnl:t.reduce((s,x)=>s+(parseFloat(x.pnl)||0),0).toFixed(2),
    aPWR:aP.length?((aP.filter(x=>x.result==='WIN').length/aP.length)*100).toFixed(1):'N/A',
    bWR:bP.length?((bP.filter(x=>x.result==='WIN').length/bP.length)*100).toFixed(1):'N/A',
    avgRR:rrVals.length?(rrVals.reduce((a,b)=>a+b,0)/rrVals.length).toFixed(2):null,
    byM,byP,byS,byTrap,byTrend};
}

function extractAnalysisData(text){
  if(!text||typeof text!=='string') return{bias:'N/A',conviction:'N/A',direction:'N/A',trendAlign:'N/A',trapScore:'N/A',setupScore:'N/A',entry:'N/A',sl:'N/A',tp1:'N/A',tp2:'N/A',rr:'N/A',srWarning:'N/A',candleSignal:'N/A',weekendRisk:'N/A',session:'N/A',rfStatus:'N/A',oneLine:'N/A'};
  const get=(patterns)=>{for(const p of patterns){try{const m=text.match(p);if(m&&m[1])return m[1].trim();}catch{}}return'N/A';};
  return{
    bias:get([/Weekly bias:\s*(BULL|BEAR|NEUTRAL)/,/Direction:\s*(BULLISH|BEARISH|NEUTRAL)/,/Direction:\s*(BULL|BEAR|NEUTRAL)/]),
    conviction:get([/Conviction:\s*([A-Za-z]+)/]),
    direction:get([/Direction:\s*(SHORT|LONG|WAIT)/,/Decision:\s*(SHORT|LONG|WAIT)/]),
    trendAlign:get([/Trend(?:\s*alignment)?:\s*(WITH TREND|AGAINST TREND)/,/Trend:\s*(WITH|AGAINST)/])||'N/A',
    trapScore:get([/[Tt]rap.*?(\d\/3)/,/trap score.*?(\d\/3)/i]),
    setupScore:get([/Score:\s*(\d+)\/10/,/(\d+)\/10\s*\|?\s*Grade/,/\|\s*(\d+)\/10/]),
    entry:get([/Entry:\s*\$?([0-9,.]+)/,/Entry:\s*([0-9.]+)/]),
    sl:get([/SL:\s*\$?([0-9,.]+)/,/SL[:\s]+([0-9.]+)/]),
    tp1:get([/TP1:\s*\$?([0-9,.]+)/,/TP1[:\s]+([0-9.]+)/]),
    tp2:get([/TP2:\s*\$?([0-9,.]+)/,/TP2[:\s]+([0-9.]+)/]),
    rr:get([/R:R:\s*([0-9.]+:[0-9.]+|[0-9.]+x?)/,/R:R[:\s]+([0-9.]+:[0-9.]+)/]),
    srWarning:text.includes('S/R WARNING')||text.includes('SHORT WARNING')||text.includes('LONG WARNING')?'⚠️ Yes':'✅ Clear',
    candleSignal:get([/Overall(?:\s+candle)?(?:\s+signal)?:\s*(CONFIRMS[^\n|]{0,50}|WARNS[^\n|]{0,50}|WAIT[^\n|]{0,50}|NO VALID[^\n|]{0,50})/]),
    weekendRisk:get([/(?:Weekend\s+)?[Rr]isk:\s*(HIGH|MEDIUM|LOW)/]),
    session:get([/Session[:\s]+([A-Za-z\s\/]+)\|/])||'N/A',
    rfStatus:get([/RF:\s*(CLEAR|RED|ORANGE|YELLOW)/])||'CLEAR',
    oneLine:get([/One-line(?:\s+decision)?:\s*\[?([^\n\]]+)/]),
  };
}

function mobileCopyFallback(text,id){
  // Create textarea, select all, copy — works on all mobile browsers
  const ta=document.createElement('textarea');
  ta.value=text;
  ta.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;opacity:0.01;z-index:9999;font-size:16px';
  document.body.appendChild(ta);
  ta.focus();
  ta.select();
  // For iOS
  ta.setSelectionRange(0,999999);
  let success=false;
  try{success=document.execCommand('copy');}catch(e){}
  document.body.removeChild(ta);
  if(success){
    showCopySuccess(id);
  } else {
    // Last resort — show text in a popup so user can manually copy
    showCopyModal(text);
  }
}

    alert('Google Sheets not connected.\nGo to Journal tab → Setup Google Sheets first.');
    return;
  }
  set({histSyncing:true,histSyncMsg:'⏳ Loading history from Google Sheets...'});
  try{
    const sheetHistory=await loadHistoryFromSheet();
    if(!sheetHistory||!sheetHistory.length){
      set({histSyncing:false,histSyncMsg:'⚠️ No history found in Google Sheets yet.'});
      setTimeout(()=>set({histSyncMsg:''}),3000);
      return;
    }
    // Merge: combine sheet history with local history, deduplicate by id
    const localIds=new Set(S.history.map(h=>String(h.id)));
    const newEntries=sheetHistory.filter(h=>!localIds.has(String(h.id)));
    const merged=[...S.history,...newEntries]
      .sort((a,b)=>Number(b.id)-Number(a.id))
      .slice(0,50);
    localStorage.setItem('ah',JSON.stringify(merged));
    const added=newEntries.length;
    set({history:merged,histSyncing:false,
      histSyncMsg:`✅ Synced! ${added} new entr${added===1?'y':'ies'} loaded from Sheets.`});
    setTimeout(()=>set({histSyncMsg:''}),4000);
  }catch(e){
    set({histSyncing:false,histSyncMsg:'❌ Sync failed. Check your connection.'});
    setTimeout(()=>set({histSyncMsg:''}),3000);
  }
}

        ${(t.entry||t.sl||t.tp)?`<div style="display:flex;gap:9px;margin-bottom:3px">${[['E',t.entry],['SL',t.sl],['TP',t.tp]].filter(([,v])=>v).map(([l,v])=>`<div style="font-size:9px;color:#64748b"><span style="color:#475569">${l}:</span>${v}</div>`).join('')}</div>`:''}

  // ── GUIDE ──
  if(S.screen==='guide'){
    const G=(title,color,items)=>`<div class="card" style="border-color:${color}22;margin-bottom:10px">

    html+=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
      <div><div style="font-size:14px;font-weight:800;color:#f1f5f9">📖 How To Use This App</div>

    </div>

    <!-- Quick Reference Card -->
    <div style="background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);border-radius:12px;padding:13px;margin-bottom:12px;border:1px solid #1e3a5f">
      <div style="font-size:9px;color:#60a5fa;letter-spacing:2px;margin-bottom:8px;font-weight:700">⚡ QUICK REFERENCE</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px">
        ${[
          ['Entry TF','15M → needs 4H candle'],
          ['Entry TF','1H → needs 1D candle'],
          ['With Trend','Min 2:1 R:R'],
          ['Against Trend','Max 1:1 R:R only'],

          ['Weekend','−1 grade, reduce size'],

      </div>
    </div>

    ${Sect('STEP 1 — PREPARE CHARTS','Best time: London open (2PM UTC+7) or NY open (1AM UTC+7)')}
    ${G('📊 What to Screenshot',[
      ['1️⃣','<strong style="color:#f1f5f9">1W (Weekly)</strong> — Check on Monday morning. Last weekly candle bull/bear? Weekly S/R levels? Weekly MACD direction? Sets your bias for the whole week.'],
      ['2️⃣','<strong style="color:#f1f5f9">1D (Daily)</strong> — Check every morning at 7AM UTC+7 (after daily candle closes). Is 1D making HH+HL (long) or LH+LL (short)? Valid 1D candle at S/R? This confirms 1H entries.'],
      ['3️⃣','<strong style="color:#f1f5f9">4H</strong> — Active monitoring. Is 4H MACD above/below zero? Valid 4H candle at S/R? This confirms 15M entries. Screenshot right after 4H candle closes (every 4 hours).'],
      ['4️⃣','<strong style="color:#f1f5f9">1H</strong> — Entry zone. Is 1H confirming direction? Fake move or real? Screenshot during London/NY open for highest accuracy.'],

    ])}

    ${Sect('STEP 2 — RUN ANALYSIS','You can upload 1 to 5 charts — minimum 1 required')}
    ${G('📊 Analyse Tab — How To Use',[
      ['🎯','Select your <strong style="color:#f1f5f9">market</strong> (Crypto/Forex/Gold) and <strong style="color:#f1f5f9">pair</strong> first.'],
      ['📸','Upload your chart screenshots into the correct TF boxes (1W, 15M, 1H, 4H, 1D). You do NOT need all 5 — upload what you have.'],
      ['💭','Type your <strong style="color:#f1f5f9">bias in the "Your Bias" box</strong>. Be specific: "I think bearish, 4H making LH, looking to short at $1,660 resistance" — the AI will validate or challenge your thinking.'],
      ['⚡','Tap <strong style="color:#f1f5f9">Analyse</strong>. The result starts with an Executive Summary — check the ONE-LINE DECISION first before reading details.'],
      ['📋','Read the <strong style="color:#f1f5f9">5-TF Breakdown → S/R Map → HTF Candle → Fake Move Check → Trade Decision</strong> in that order.'],
    ])}

    ${Sect('STEP 3 — UNDERSTAND THE RESULT','')}
    ${G('⚡ Reading the Executive Summary',[
      ['✅','<strong style="color:#4ade80">ENTER NOW</strong> — All conditions met. Valid HTF candle at S/R. Use the entry/SL/TP levels given. Check R:R rule (2:1 with trend / 1:1 against trend).'],
      ['⏳','<strong style="color:#fbbf24">WAIT</strong> — Setup is forming but not confirmed yet. The analysis will tell you exactly what to wait for (e.g. "Wait for 4H bearish engulfing at $1,660"). Set an alert at that level.'],
      ['❌','<strong style="color:#f87171">SKIP</strong> — Setup does not meet minimum conditions. DO NOT force a trade. Wait for the next opportunity.'],

    ${G('🏆 Setup Grades',[
      ['⭐⭐⭐','<strong style="color:#4ade80">A+ (8-10/10)</strong> — All TFs aligned, valid HTF candle, volume confirms, real move. FULL position size (1-2% account).'],
      ['⭐⭐','<strong style="color:#fbbf24">B (6-7/10)</strong> — Most conditions met but 1-2 missing. HALF position size (0.5-1% account).'],
      ['⭐','<strong style="color:#f87171">C or SKIP (<6/10)</strong> — Too many conditions missing. NO TRADE. Wait for a better setup.'],
      ['📅','<strong style="color:#94a3b8">Weekend rule</strong> — Automatically reduces grade by 1 level. A+ becomes B, B becomes C. Always reduce position size on weekends.'],
    ])}

    ${Sect('STEP 4 — HTF CANDLE RULE','The most important rule in the system')}
    ${G('🕯️ Which Candle Confirms Which Entry',[
      ['📍','<strong style="color:#f1f5f9">15M entry</strong> → Requires a valid <strong style="color:#a78bfa">4H candle at 4H S/R</strong>. The 4H candle must close before you enter on 15M. A ⭐⭐⭐ 4H bearish engulfing at resistance = strong confirmation for short.'],
      ['📍','<strong style="color:#f1f5f9">1H entry</strong> → Requires a valid <strong style="color:#a78bfa">1D candle at 1D S/R</strong>. The daily candle must show rejection/confirmation at a key daily level.'],

    ${Sect('STEP 5 — FAKE MOVE DETECTION','')}

      ['1️⃣','After analysis says WAIT → tap <strong style="color:#f97316">🔔 Set Alert from This Analysis</strong> button. Entry level, SL, TP are pre-filled automatically.'],

      ['3️⃣','When price hits your alert on Binance → come back to app → tap <strong style="color:#f1f5f9">Hit!</strong> on that alert.'],
      ['4️⃣','App takes you to <strong style="color:#a78bfa">Recheck tab</strong> with your original plan pre-loaded. Upload just 2-3 charts (entry TF + HTF).'],
      ['5️⃣','Get quick <strong style="color:#4ade80">ENTER ✅ / WAIT ⏳ / SKIP ❌</strong> decision. Then tap what you did (Entered/Skipped/Missed) — this data builds your accuracy report.'],
    ])}

    ${Sect('STEP 7 — LOG YOUR TRADES','')}
    ${G('📓 Journal Tab — After Trade Closes',[
      ['✅','Log EVERY trade — win or loss. Data quality = system improvement quality.'],
      ['📊','Fill in: Pair, Direction, Grade, Result, Entry/SL/TP, PNL, Actual R:R, Trap Score, Trend Alignment, Session, Checklist items.'],
      ['☁️','All trades auto-sync to your Google Sheet → permanent record, never lost.'],
      ['📋','After 50 trades → go to Stats tab → tap <strong style="color:#4ade80">Copy Report</strong> → paste in Claude chat → get rule adjustment suggestions.'],
    ])}

    ${Sect('STEP 8 — REVIEW & IMPROVE','')}
    ${G('📈 Stats & Pattern Tracker',[
      ['🎯','<strong style="color:#f1f5f9">Target: 70%+ win rate</strong>. Check your stats regularly. The breakdown shows: WR by session, trap score, trend alignment, pair, market.'],
      ['🧠','<strong style="color:#a78bfa">AI Pattern Review</strong> — after 50+ trades tap the button. Gets specific rule adjustments from YOUR data.'],
      ['📋','<strong style="color:#60a5fa">Copy Report for Claude</strong> — paste in chat with me. I analyse your real patterns and update the system rules.'],
      ['🔄','Every 50 trades → share report → rules update → app gets smarter → win rate improves.'],
    ])}

    ${Sect('THE 10 A+ CONDITIONS','Every condition must be checked before entry')}
    <div class="card" style="border-color:#1e3a1e">
      ${['① 1W weekly bias confirms direction','② 1D macro direction confirms','③ 4H candle at 4H S/R confirms 15M entry','④ 1D candle at 1D S/R confirms 1H entry','⑤ 1H confirms entry zone (no fake move)','⑥ 15M trigger: 3/3 trap conditions met','⑦ MACD aligned across all relevant TFs','⑧ Volume confirms (above avg on signal candle)','⑨ NOT at wrong S/R (not shorting support / not longing resistance)','⑩ R:R meets rule (2:1 with trend / 1:1 against)'].map((c,i)=>`<div style="display:flex;gap:8px;align-items:flex-start;padding:5px 0;border-bottom:${i<9?'1px solid #1e293b':'none'}"><span style="font-size:11px;color:#4ade80;flex-shrink:0">✓</span><span style="font-size:11px;color:#94a3b8">${c}</span></div>`).join('')}
    </div>

    ${Sect('R:R RULES','Non-negotiable — always apply')}
    ${G('💰 Risk:Reward Rules',[
      ['📈','<strong style="color:#4ade80">WITH HTF TREND (1W+1D+4H same direction)</strong> → Minimum <strong style="color:#4ade80">2:1 R:R</strong>. Hold for bigger moves. Trail SL as price moves in your favour.'],
      ['📉','<strong style="color:#f97316">AGAINST HTF TREND (counter-trend)</strong> → Maximum <strong style="color:#f97316">1:1 R:R ONLY</strong>. Take profit fast. Do not hold. If 1:1 not achievable → SKIP.'],
      ['⚖️','<strong style="color:#94a3b8">Position sizing</strong>: A+ = 1-2% account risk | B = 0.5-1% | Weekend = always reduce by 50% | Counter-trend = 0.5% max.'],
    ])}

    ${Sect('WEEKEND RULES','Every Saturday & Sunday')}
    ${G('📅 Weekend Trading Guide',[
      ['⚠️','Volume is 30-50% lower on weekends. False moves are more common. All grades reduced by 1 level automatically.'],
      ['🔴','<strong style="color:#f87171">Saturday pump → Sunday dump</strong>: Retail buys the rally, smart money sells into it. Do not long Saturday pumps.'],
      ['🟢','<strong style="color:#4ade80">Saturday dump → Monday recovery</strong>: Weak hands shaken out before institutional buying Monday.'],
      ['📊','<strong style="color:#94a3b8">Volume < 30% of average</strong> → 78% chance of reversal within 48h. If this happens: do not enter new trades.'],
      ['🕐','<strong style="color:#fbbf24">Best action on weekends</strong>: Plan your alerts, review your journal, wait for Monday London open for real direction.'],
    ])}

    <div style="background:#0a1f0d;border:1px solid #166534;border-radius:10px;padding:12px;margin-top:4px;text-align:center">
      <div style="font-size:11px;color:#4ade80;font-weight:700;margin-bottom:4px">🎯 THE GOAL</div>
      <div style="font-size:12px;color:#94a3b8;line-height:1.7">Trade only A+ and B setups WITH the weekly trend.<br>Log every trade. Review every 50 trades.<br>Target: <strong style="color:#4ade80">70%+ win rate</strong> proven by real data.</div>
    </div>
    <div style="text-align:center;margin-top:10px;font-size:9px;color:#1e293b">Smart Money Framework — 1zcelsius Trading System</div>`;
  }

  // ── STATS ──
  if(S.screen==='stats'){
    html+=`<div style="font-size:14px;font-weight:800;color:#f1f5f9;margin-bottom:11px">Win Rate & Pattern Tracker</div>`;
    const st=stats;
    if(!st)html+=`<div class="loading"><div style="font-size:20px;margin-bottom:6px">📈</div>No trades yet. Log trades to see patterns.</div>`;
    else{
      const wrc=parseFloat(st.wr)>=70?'#4ade80':parseFloat(st.wr)>=50?'#fbbf24':'#f87171';
      html+=`<div class="card" style="border-color:#1e3a1e;text-align:center"><span class="lbl">OVERALL WIN RATE</span>
        <div style="font-size:46px;font-weight:900;color:${wrc};line-height:1">${st.wr}%</div>
        <div style="font-size:10px;color:#475569;margin-top:3px">Target 70% ${parseFloat(st.wr)>=70?'✅ Achieved!':'· Need '+(70-parseFloat(st.wr)).toFixed(1)+'% more'}</div>
        <div class="pbar-bg"><div class="pbar" style="width:${Math.min(parseFloat(st.wr),100)}%;background:${wrc}"></div></div>
      </div>`;

      html+=`<div class="stat-grid">${[['Total',st.total,'#94a3b8'],['Wins',st.wins,'#4ade80'],['Losses',st.losses,'#f87171'],['BE',st.be,'#fbbf24']].map(([l,v,c])=>`<div class="stat-box"><div style="font-size:15px;font-weight:800;color:${c}">${v}</div><div style="font-size:8px;color:#475569;margin-top:1px">${l}</div></div>`).join('')}</div>`;

      html+=`<div class="card"><span class="lbl">KEY PATTERN STATS</span>
        ${[['A+ Setup WR',st.aPWR,'8/8 conditions'],['B Setup WR',st.bWR,'6-7/8'],['With Trend WR',st.byTrend?.WITH?((st.byTrend.WITH.wins/st.byTrend.WITH.total)*100).toFixed(1):'N/A','Same dir 1D+4H'],['Against Trend WR',st.byTrend?.AGAINST?((st.byTrend.AGAINST.wins/st.byTrend.AGAINST.total)*100).toFixed(1):'N/A','Counter-trend'],['Trap 3/3 WR',st.byTrap?.['3/3']?((st.byTrap['3/3'].wins/st.byTrap['3/3'].total)*100).toFixed(1):'N/A','Full trap confirmed'],['Avg R:R',st.avgRR?st.avgRR+'x':'N/A','Actual achieved']].map(([label,val,sub],i)=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:${i<5?'1px solid #1e293b':'none'}"><div><div style="font-size:11px;font-weight:700;color:#e2e8f0">${label}</div><div style="font-size:9px;color:#475569">${sub}</div></div><div style="font-size:14px;font-weight:800;color:${val==='N/A'||val==='N/Ax'?'#64748b':parseFloat(val)>=70?'#4ade80':parseFloat(val)>=50?'#fbbf24':'#f87171'}">${val}${val!=='N/A'&&val!=='N/Ax'&&!val.includes('x')?'%':''}</div></div>`).join('')}
      </div>`;

      if(Object.keys(st.byS).length>0)html+=`<div class="card"><span class="lbl">BY SESSION</span>${Object.entries(st.byS).sort(([,a],[,b])=>b.total-a.total).map(([s,d])=>wrRow(s,d,d.total+' trades')).join('')}</div>`;
      if(Object.keys(st.byTrap).length>0)html+=`<div class="card"><span class="lbl">BY TRAP SCORE</span>${['3/3','2/3','1/3','0/3'].filter(k=>st.byTrap[k]).map(k=>wrRow('Trap '+k,st.byTrap[k],st.byTrap[k].total+' trades')).join('')}</div>`;
      if(Object.keys(st.byM).length>1)html+=`<div class="card"><span class="lbl">BY MARKET</span>${Object.entries(st.byM).map(([mk,d])=>{const mc=MARKETS[mk]||MARKETS.crypto;return wrRow(mc.icon+' '+mc.label,d,d.total+' trades');}).join('')}</div>`;
      html+=`<div class="card"><span class="lbl">BY PAIR</span>${Object.entries(st.byP).map(([p,d])=>{const mc=MARKETS[d.market||'crypto']||MARKETS.crypto;return wrRow(mc.icon+' '+p,d,d.total+' trades');}).join('')}</div>`;
      html+=`<div class="card"><span class="lbl">TOTAL PNL</span><div style="font-size:22px;font-weight:800;color:${parseFloat(st.pnl)>=0?'#4ade80':'#f87171'}">${parseFloat(st.pnl)>=0?'+':''}${st.pnl}</div></div>`;

      html+=`<div class="card" style="border-color:#2d1b4e"><span class="lbl" style="color:#a78bfa">🧠 PATTERN INSIGHT</span>

      </div>`;

      html+=`<div class="card" style="border-color:#1e3a5f"><span class="lbl" style="color:#60a5fa">🤖 AI PATTERN REVIEW</span>
        <div style="font-size:9px;color:#475569;margin-bottom:9px;line-height:1.5">Get AI analysis of your patterns with specific rule adjustments.</div>
        ${!S.review&&!S.revLoading?`<button onclick="runReview()" style="width:100%;padding:10px;border-radius:8px;border:none;background:linear-gradient(135deg,#60a5fa,#3b82f6);color:#fff;font-size:11px;font-weight:700;cursor:pointer">🤖 Get AI Pattern Review</button>`:''}
        ${S.revLoading?`<div style="text-align:center;padding:12px;color:#64748b;font-size:11px">⏳ Analysing your patterns...</div>`:''}

      </div>`;

      html+=`<div class="card"><span class="lbl">📋 COPY REPORT FOR CLAUDE CHAT</span>
        <div style="font-size:9px;color:#475569;margin-bottom:8px">Paste in chat so I can update rules based on your real data.</div>
        <button onclick="copyReport()" style="width:100%;padding:9px;border-radius:8px;border:none;background:linear-gradient(135deg,#60a5fa,#3b82f6);color:#fff;font-size:11px;font-weight:700;cursor:pointer">📋 Copy Report</button>
      </div>`;

  }

  document.getElementById('app').innerHTML=html;
}

function switchToEntry(){if(!S.entry)runEntry();else set({screen:'entry'});}

function copyReport(){
  const st=calcStats();if(!st)return alert('No trades to report.');
  const wTr=st.byTrend?.WITH?((st.byTrend.WITH.wins/st.byTrend.WITH.total)*100).toFixed(1):'N/A';
  const aTr=st.byTrend?.AGAINST?((st.byTrend.AGAINST.wins/st.byTrend.AGAINST.total)*100).toFixed(1):'N/A';
  const t3=st.byTrap?.['3/3']?((st.byTrap['3/3'].wins/st.byTrap['3/3'].total)*100).toFixed(1):'N/A';
  const bestS=Object.entries(st.byS||{}).sort(([,a],[,b])=>((b.wins/b.total)-(a.wins/a.total)))[0];
  const text=`=== TRADING JOURNAL REVIEW ===\nTotal: ${st.total} trades | WR: ${st.wr}% | Target: 70%\nWins: ${st.wins} | Losses: ${st.losses} | BE: ${st.be} | PNL: ${st.pnl}\n\nA+ WR: ${st.aPWR}% | B WR: ${st.bWR}%\nWith-Trend WR: ${wTr}% | Against-Trend WR: ${aTr}%\nTrap 3/3 WR: ${t3}% | Avg R:R: ${st.avgRR||'N/A'}x\nBest Session: ${bestS?bestS[0]+' ('+((bestS[1].wins/bestS[1].total)*100).toFixed(0)+'%)':'N/A'}\nBy Pair: ${Object.entries(st.byP).map(([p,d])=>p+':'+((d.wins/d.total)*100).toFixed(0)+'%').join(' | ')}\nBy Session: ${Object.entries(st.byS||{}).map(([s,d])=>s+':'+((d.wins/d.total)*100).toFixed(0)+'%').join(' | ')}\n\nPlease analyse this data and suggest specific rule adjustments to help me reach 70%+ win rate.`;
  navigator.clipboard?.writeText(text).then(()=>alert('Report copied! Paste in Claude chat.')).catch(()=>alert('Copy failed — screenshot the stats instead.'));
}

render();
